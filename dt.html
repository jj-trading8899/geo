{
  id:2, label:"Topic 3", dotClass:"dot-man", tagClass:"tag-man", typeLabel:"Manufacturing",
  title:"Manufacturing Process Calculations",
  focus:"Cutting speeds, spindle RPM, MRR, batch costing, tolerances and surface finish",
  topics:[
    {title:"Cutting Speed & Spindle RPM",body:"Cutting speed (v): the linear speed of the cutting edge relative to the workpiece — determined by material and tooling, not machine settings. Set in m/min from material/tool tables (e.g. HSS cutting mild steel ≈ 25–30 m/min; carbide inserts ≈ 100+ m/min). Spindle speed (N) in RPM is derived from cutting speed and diameter. Incorrect RPM: too fast → overheating, poor surface finish, tool wear; too slow → work hardening, chatter."},
    {title:"Material Removal Rate",body:"Material Removal Rate (MRR) quantifies how quickly material is removed — used to estimate machining time and power consumption. In turning: MRR = cutting speed × feed rate × depth of cut. Higher MRR = faster machining but more heat, tool wear and lower surface quality. Surface roughness Ra (μm) decreases (improves) with lower feed rate, higher cutting speed and smaller depth of cut."},
    {title:"Batch Costing & Production Economics",body:"Unit cost has two components: fixed costs (setup, tooling, design — amortised over the batch) and variable costs (material, labour per part, energy). Fixed cost per unit falls with larger batches — this is why injection moulding (£10,000–£100,000 tooling cost) only makes economic sense for large production volumes. Break-even: the point where revenue equals total cost."},
    {title:"Tolerances & Fits",body:"Tolerance: the permissible variation in a dimension. Bilateral: ±0.1mm (equal in both directions). Unilateral: +0.0/−0.2mm (deviation in one direction only). Total tolerance band = upper limit minus lower limit. Fits: clearance (shaft always smaller than hole — moving parts), transition (may have clearance or interference), interference (shaft always larger than hole — press/shrink fits for permanent assembly). Surface roughness Ra: turned surface 1.6–6.3μm; ground 0.2–0.8μm; injection moulded 0.4–1.6μm."}
  ],
  formulas:[
    {name:"Spindle speed from cutting speed",expr:"N = (1000 × v) / (π × D)",note:"Rearrangement of v = πDN/1000. Used to set machine RPM.",units:"N in RPM. v in m/min. D in mm. The 1000 converts mm to m."},
    {name:"Cutting speed from spindle speed",expr:"v = (π × D × N) / 1000",note:"Used to check if current RPM gives correct cutting speed.",units:"v in m/min. D in mm. N in RPM."},
    {name:"Material Removal Rate (turning)",expr:"MRR = v × f × d",note:"v = cutting speed (mm/min), f = feed rate (mm/rev), d = depth of cut (mm).",units:"MRR in mm³/min. Convert v to mm/min: × 1000 if given in m/min."},
    {name:"Machining time (turning)",expr:"T = L / (f × N)",note:"L = length of cut (mm), f = feed (mm/rev), N = spindle speed (RPM).",units:"T in minutes. L in mm, f in mm/rev, N in RPM."},
    {name:"Unit cost (batch production)",expr:"Unit cost = (Fixed cost / Batch size) + Variable cost per part",note:"Fixed costs: setup, tooling, programming. Variable: material, labour, energy.",units:"All in £. Fixed cost per unit decreases as batch size increases."},
    {name:"Break-even quantity",expr:"Break-even = Fixed cost / (Selling price − Variable cost per unit)",note:"The minimum batch size before the product starts making profit.",units:"Dimensionless (number of units). Also called contribution analysis."},
    {name:"Percentage dimensional error",expr:"%error = |Measured − Nominal| / Nominal × 100",note:"Used to quantify how far a manufactured dimension is from design intent.",units:"Dimensionless %. Measured and nominal must be in same units."},
    {name:"Tolerance band",expr:"Tolerance = Upper Limit − Lower Limit",note:"For bilateral ±t: total band = 2t. Always calculate both limits before checking.",units:"In mm, μm or same as dimension."}
  ],
  examples:[
    {q:"Calculate the spindle speed required to turn a 40 mm diameter aluminium shaft at a cutting speed of 120 m/min (carbide insert).",steps:[
      {text:"Formula: <code>N = (1000 × v) / (π × D)</code>"},
      {text:"Substitute: <code>N = (1000 × 120) / (π × 40)</code>"},
      {text:"Calculate: <code>N = 120,000 / 125.66 = 954.9 RPM</code>"},
      {text:"Round to nearest available machine speed: <code>N ≈ 950 RPM</code>"},
      {text:"Note: going significantly faster than this will cause tool wear and poor surface finish; too slow causes work hardening in aluminium."}
    ],answer:"N ≈ 955 RPM. Set machine to nearest standard speed (often 900 or 1000 RPM). Record the actual speed used and the resulting cutting speed."},
    {q:"A CNC lathe turns a workpiece at N = 400 RPM with feed f = 0.2 mm/rev and depth of cut d = 2 mm. Workpiece diameter = 50mm. Calculate MRR and machining time for a 150mm cut length.",steps:[
      {text:"Cutting speed: <code>v = πDN/1000 = π×50×400/1000 = 62.83 m/min = 62,832 mm/min</code>"},
      {text:"MRR: <code>MRR = v × f × d = 62,832 × 0.2 × 2 = 25,133 mm³/min</code>"},
      {text:"Machining time: <code>T = L/(f×N) = 150/(0.2×400) = 150/80 = 1.875 min ≈ 1 min 53 sec</code>"},
      {text:"Increasing feed to 0.4mm/rev would halve the time (0.94 min) but produce a rougher surface."}
    ],answer:"MRR = 25,133 mm³/min; machining time = 1.875 min. There is a direct trade-off between production speed (high feed) and surface quality (low feed)."},
    {q:"A batch of 250 injection-moulded brackets has total tooling and setup cost £5,000. Material and labour cost per bracket is £0.80. Brackets sell for £4.50 each. Calculate: (a) unit cost, (b) break-even quantity, (c) profit on 250 units.",steps:[
      {text:"(a) Unit cost: <code>£5,000/250 + £0.80 = £20.00 + £0.80 = £20.80 per bracket</code>"},
      {text:"(b) Break-even: <code>Q = Fixed cost / (Selling price − Variable cost) = £5,000 / (£4.50 − £0.80) = £5,000 / £3.70 = 1,351 units</code>"},
      {text:"(c) Profit on 250 units: Revenue = <code>250 × £4.50 = £1,125</code>. Total cost = <code>£5,000 + 250×£0.80 = £5,200</code>"},
      {text:"Profit = <code>£1,125 − £5,200 = −£4,075</code> — a LOSS. The batch of 250 is far below break-even."}
    ],answer:"Unit cost = £20.80; break-even = 1,351 units; loss of £4,075 at 250 units. This demonstrates why injection moulding requires high-volume production to be economical."},
    {q:"A shaft is specified as ø35.00 ±0.04 mm. Measured shaft diameter = 35.06 mm. (a) Is it in tolerance? (b) Calculate the percentage error.",steps:[
      {text:"Upper limit: <code>35.00 + 0.04 = 35.04 mm</code>. Lower limit: <code>35.00 − 0.04 = 34.96 mm</code>"},
      {text:"Measured = 35.06mm. Check: <code>35.06 > 35.04</code> → OUT OF TOLERANCE (oversize by 0.02mm)"},
      {text:"Percentage error: <code>|35.06 − 35.00| / 35.00 × 100 = 0.06/35 × 100 = 0.171%</code>"},
      {text:"Disposition: this part must be rejected or reworked (turned down to within tolerance). Oversize shafts can be reworked; undersize shafts are usually scrap."}
    ],answer:"OUT OF TOLERANCE — shaft is 35.06mm, 0.02mm above upper limit of 35.04mm. Percentage error = 0.171%. Part must be reworked or scrapped."},
    {q:"A product is made by two methods. Method A: setup £800, variable £2.50/unit. Method B: setup £200, variable £4.00/unit. Find the break-even quantity and state which is cheaper for a batch of 400.",steps:[
      {text:"Break-even: set costs equal. <code>800 + 2.50Q = 200 + 4.00Q</code>"},
      {text:"Rearrange: <code>600 = 1.50Q → Q = 400 units</code>"},
      {text:"At Q = 400: Method A = <code>800 + 2.50×400 = 800+1000 = £1,800</code>"},
      {text:"Method B = <code>200 + 4.00×400 = 200+1600 = £1,800</code> — equal at break-even."},
      {text:"For Q < 400: Method B is cheaper (lower setup). For Q > 400: Method A is cheaper (lower variable cost). At Q = 400: they cost the same."}
    ],answer:"Break-even at Q = 400 units. At exactly 400 both cost £1,800. Method B is better for small batches; Method A for large batches — this is a classic make-vs-buy or process selection calculation."}
  ],
  diagrams:[
    {title:"Tolerance Limits — Engineering Drawing Annotation",steps:[
      "Draw a component cross-section with a dimension leader pointing to the feature",
      "Nominal dimension: 25.00 mm",
      "Bilateral tolerance: write as 25.00 ±0.05 → limits: 24.95 to 25.05 (total band = 0.10mm)",
      "Unilateral tolerance: 25.00 +0.00/−0.10 → limits: 24.90 to 25.00 (shaft never exceeds nominal)",
      "For a mating hole: specify ø25.20 +0.10/−0.00 → hole never smaller than 25.20mm",
      "Clearance fit check: minimum clearance = smallest hole − largest shaft = 25.20 − 25.05 = 0.15mm (clearance always exists ✓)",
      "Annotate: Maximum Material Condition (MMC) = largest shaft / smallest hole; Minimum Material Condition (LMC) = smallest shaft / largest hole"
    ]},
    {title:"Break-Even Chart — How to Draw",steps:[
      "Draw axes: vertical = cost/revenue (£); horizontal = quantity produced (units)",
      "Fixed cost line: horizontal line at Fixed Cost value (does not change with quantity)",
      "Total cost line: starts at Fixed Cost on y-axis, rises with gradient = variable cost per unit",
      "Revenue line: starts at origin (0,0), rises with gradient = selling price per unit",
      "Break-even point: intersection of Revenue and Total Cost lines",
      "Profit zone: to the right of break-even where Revenue > Total Cost",
      "Loss zone: to the left of break-even",
      "Label: fixed cost, variable cost gradient, break-even quantity, margin of safety (actual quantity − break-even)"
    ]}
  ],
  analysis:[
    {heading:"Cutting Speed vs Surface Quality Trade-off",chain:"Higher cutting speed → more heat generated at cutting zone → thermal softening of workpiece material → built-up edge on tool if speed too low → poor surface finish → optimal cutting speed from tables balances heat generation, tool life and surface quality → carbide inserts tolerate higher speeds than HSS → coolant/lubricant reduces heat and extends tool life → CNC machines use constant surface speed (CSS) to maintain optimal v as diameter changes during turning",evals:["Tool wear increases exponentially with cutting speed beyond the optimal range — doubling cutting speed may halve tool life (Taylor's tool life equation: vTⁿ = C)","Feed rate has the strongest effect on surface roughness Ra — reducing feed from 0.4 to 0.1mm/rev can reduce Ra by 4× (Ra ≈ f²/8r where r = tool nose radius)","Depth of cut has least effect on surface quality but most effect on MRR — manufacturers often take roughing cuts at high depth/high feed, then finish at low feed/low depth for final dimensions"],mistake:"Don't state simply 'higher cutting speed gives better surface finish'. At optimal speed this is true, but excessive speed causes built-up edge and chatter, worsening surface quality. Always contextualise with 'within the recommended cutting speed range'."},
    {heading:"Production Volume and Process Selection",chain:"Identify production volume (one-off / batch / mass) → one-off: manual machining, FDM printing, hand lay-up — high labour, low tooling cost → batch (10–10,000): CNC machining, vacuum forming — moderate tooling, reduced labour per part → mass production (10,000+): injection moulding, die casting, stamping — high tooling cost, very low unit cost → the economic break-even determines at which volume the switch between processes becomes cost-effective",evals:["FDM 3D printing has near-zero setup cost — ideal for one-offs and prototypes — but unit cost barely falls with volume (machine time per part is constant). Injection moulding unit cost falls dramatically with volume but requires expensive tooling","Additive manufacturing is disrupting traditional volume thresholds — for complex geometries with internal features, AM may compete with CNC machining even for small batches because it eliminates multiple setups","Lead time (time from order to delivery) is not captured in unit cost calculations — a process with lower unit cost but 8-week tooling lead time may be commercially inferior to a faster process with higher unit cost"],mistake:"Don't recommend injection moulding for a batch of 50 or CNC machining for a batch of 50,000 without justification. Always explicitly link process selection to production volume and tooling cost amortisation."}
  ],
  quiz:[
    {q:"A 60mm diameter steel bar must be machined at v = 30 m/min (HSS tool). The required spindle speed is approximately:",opts:["159 RPM","318 RPM","637 RPM","1,273 RPM"],correct:0,exp:"N = (1000 × v)/(π × D) = (1000 × 30)/(π × 60) = 30,000/188.5 = 159.2 RPM ≈ 159 RPM. Set machine to nearest available speed (often 125 or 160 RPM). Going faster with HSS on steel causes rapid tool wear; going too slow may cause work hardening or chatter."},
    {q:"A batch of 500 components has fixed costs of £2,000 and variable costs of £1.50 per unit. Unit cost is:",opts:["£4.00","£5.50","£3.50","£2.00"],correct:1,exp:"Unit cost = Fixed/batch + variable = £2,000/500 + £1.50 = £4.00 + £1.50 = £5.50. If batch were 2,000: unit cost = £1.00+£1.50 = £2.50. This shows how fixed cost amortisation drives batch size decisions — larger batches dramatically reduce unit cost when fixed costs are significant."},
    {q:"A hole is specified as ø20.00 +0.10/−0.00 mm. The upper and lower limits are:",opts:["20.10mm and 20.00mm","20.00mm and 19.90mm","20.05mm and 19.95mm","20.10mm and 19.90mm"],correct:0,exp:"Upper limit: nominal + upper deviation = 20.00 + 0.10 = 20.10mm. Lower limit: nominal + lower deviation = 20.00 + 0.00 = 20.00mm. This is a unilateral tolerance — the hole can be up to 0.10mm oversize but must not be undersize (a hole can be enlarged but not easily made smaller after machining)."},
    {q:"Break-even quantity with fixed cost £1,500, selling price £8 per unit, variable cost £3 per unit is:",opts:["187 units","300 units","500 units","750 units"],correct:1,exp:"Break-even = Fixed cost / (Price − Variable cost) = £1,500 / (£8 − £3) = £1,500 / £5 = 300 units. The £5 'contribution' from each unit first covers the fixed costs (300 units × £5 = £1,500) and then creates profit. Units 301 onwards each contribute £5 directly to profit."}
  ],
  quickPrompts:["How do I calculate spindle speed from cutting speed — walk me through the formula","Explain break-even analysis with a worked example","What is the difference between bilateral and unilateral tolerances?"]
},
{
  id:3, label:"Topic 4", dotClass:"dot-qual", tagClass:"tag-qual", typeLabel:"Quality & Risk",
  title:"Quality, FMEA & Process Control",
  focus:"FMEA risk priority numbers, process capability, statistical process control and percentage error",
  topics:[
    {title:"FMEA — Failure Mode & Effects Analysis",body:"FMEA identifies potential failure modes BEFORE they occur and ranks them by risk. Each failure mode is rated on three 1–10 scales: Severity (how bad the consequence), Occurrence (how likely the failure is to happen), Detectability (how likely the failure is to be detected before reaching the customer — note: 10 = cannot detect, 1 = certain detection). RPN = Severity × Occurrence × Detectability. Actions prioritised on failures with RPN > threshold (often 100) OR any Severity ≥ 9 regardless of RPN."},
    {title:"Process Capability (Cp & Cpk)",body:"Process capability measures whether a manufacturing process is capable of consistently producing parts within tolerance. Cp = (USL − LSL)/(6σ) where σ is the process standard deviation. Cp > 1: capable (process spread fits within tolerance). Cp > 1.33: good. Cp > 1.67: excellent. Cp = 2: Six Sigma (3.4 defects per million). Cpk accounts for process centering: Cpk = min[(USL−μ)/3σ, (μ−LSL)/3σ]. A process can be capable (high Cp) but off-centre (low Cpk)."},
    {title:"Statistical Process Control (SPC)",body:"SPC uses control charts to monitor process variation in real time and detect drift before defects occur. X̄ chart (mean chart): plots sample means against control limits (UCL = X̄̄ + 3σ/√n). R chart (range chart): plots sample ranges. A point outside control limits signals a special cause of variation requiring investigation. Process in control ≠ process in specification — a centred process with high variation can be in control but not capable."},
    {title:"Inspection & Quality Systems",body:"ISO 9001: quality management system requiring documented processes, internal auditing and continual improvement. First article inspection (FAI): thorough inspection of the first part from a new setup — verifies all dimensions before committing to full production. Go/No-Go gauging: quick pass/fail check — 'Go' end must enter the part; 'No-Go' end must not. Attribute data (pass/fail) vs variable data (measured dimensions). Six Sigma DMAIC: Define → Measure → Analyse → Improve → Control."}
  ],
  formulas:[
    {name:"Risk Priority Number (FMEA)",expr:"RPN = Severity × Occurrence × Detectability",note:"Each rated 1–10. Max RPN = 1,000. Note: Detectability 10 = cannot detect (HIGH risk). Detectability 1 = certain detection (LOW risk — opposite to Severity/Occurrence).",units:"RPN is dimensionless. Action typically required for RPN > 100 or Severity ≥ 9"},
    {name:"Process Capability (Cp)",expr:"Cp = (USL − LSL) / (6σ)",note:"USL = Upper Spec Limit, LSL = Lower Spec Limit. σ = process standard deviation. Cp > 1 = capable (fits within tolerance).",units:"Cp is dimensionless. USL, LSL, σ must all be in same units (mm, μm, etc.)"},
    {name:"Process Capability Index (Cpk)",expr:"Cpk = min[(USL − μ)/(3σ), (μ − LSL)/(3σ)]",note:"Accounts for process being off-centre. Cpk ≤ Cp always. If process centred: Cpk = Cp.",units:"Cpk dimensionless. μ = process mean"},
    {name:"Defect rate from Cp",expr:"Cp=1 → 0.27% defects; Cp=1.33 → 64ppm; Cp=2 → 3.4ppm (Six Sigma)",note:"ppm = parts per million. A dramatic improvement in Cp gives exponentially fewer defects.",units:"Percentage or ppm"},
    {name:"Control chart limits (X̄ chart)",expr:"UCL = X̄̄ + 3σ/√n  ;  LCL = X̄̄ − 3σ/√n",note:"X̄̄ = grand mean (mean of sample means). n = sample size. 3σ limits: 99.73% of normal distribution.",units:"Same units as measurement. σ from process data"},
    {name:"Percentage error",expr:"%error = |Measured − Nominal| / Nominal × 100%",note:"Used to report accuracy of measurements and manufactured dimensions.",units:"Result in %. Measured and nominal in same units."},
    {name:"Scrap rate",expr:"Scrap rate = (Number of defects / Total produced) × 100%",note:"Used to calculate cost of poor quality: scrap cost = scrap rate × unit cost × production volume.",units:"Result in %"}
  ],
  examples:[
    {q:"An FMEA assessment identifies a failure mode with Severity = 7, Occurrence = 5, Detectability = 6. Calculate RPN. A second failure mode has Severity = 9, Occurrence = 2, Detectability = 3. Calculate its RPN. Which should be prioritised?",steps:[
      {text:"Failure 1: <code>RPN₁ = 7 × 5 × 6 = 210</code>"},
      {text:"Failure 2: <code>RPN₂ = 9 × 2 × 3 = 54</code>"},
      {text:"Failure 1 has higher RPN (210 vs 54) — a standard threshold-based approach prioritises Failure 1."},
      {text:"HOWEVER: Failure 2 has Severity = 9 (near-catastrophic consequence). Many quality systems mandate action on any failure with Severity ≥ 9 regardless of RPN."},
      {text:"Recommendation: address BOTH — Failure 1 for its high overall risk score; Failure 2 for its unacceptably high severity consequence."}
    ],answer:"RPN₁=210 (prioritise first). RPN₂=54 (lower priority numerically). But Severity=9 of Failure 2 demands independent attention — RPN alone can mask critical high-severity failures."},
    {q:"A milling process has a specification of 50.00 ±0.15 mm (USL=50.15, LSL=49.85). Process mean μ = 50.02 mm, process σ = 0.04 mm. Calculate Cp and Cpk. Is the process capable?",steps:[
      {text:"Cp: <code>Cp = (USL−LSL)/(6σ) = (50.15−49.85)/(6×0.04) = 0.30/0.24 = 1.25</code>"},
      {text:"Cp = 1.25 > 1 → process is CAPABLE (spread fits within tolerance)."},
      {text:"Cpk upper: <code>(USL−μ)/(3σ) = (50.15−50.02)/(3×0.04) = 0.13/0.12 = 1.083</code>"},
      {text:"Cpk lower: <code>(μ−LSL)/(3σ) = (50.02−49.85)/(3×0.04) = 0.17/0.12 = 1.417</code>"},
      {text:"Cpk = min(1.083, 1.417) = 1.083. Process is slightly off-centre toward USL but still marginally capable (Cpk > 1)."}
    ],answer:"Cp = 1.25 (capable). Cpk = 1.083 (capable but off-centre). Action: re-centre process by adjusting tool offset by ~0.02mm toward nominal to improve Cpk."},
    {q:"A production run of 5,000 components costs £2.40 each to make. The scrap rate is 3.2%. Calculate: (a) number of defects, (b) cost of scrap, (c) effective cost per good part.",steps:[
      {text:"(a) Number of defects: <code>5,000 × 0.032 = 160 defective parts</code>"},
      {text:"(b) Cost of scrap: <code>160 × £2.40 = £384</code>"},
      {text:"(c) Good parts produced: <code>5,000 − 160 = 4,840</code>"},
      {text:"Total cost of production: <code>5,000 × £2.40 = £12,000</code>"},
      {text:"Effective cost per good part: <code>£12,000 / 4,840 = £2.479 per good part</code>"}
    ],answer:"160 defects; scrap cost £384; effective cost per good part £2.48 (vs £2.40 nominal — a 3.3% cost premium). Reducing scrap rate from 3.2% to 0.5% would save £332 on this run."},
    {q:"Five samples are measured: 24.92, 25.04, 24.98, 25.01, 24.95 mm. The nominal is 25.00 mm. Calculate (a) sample mean, (b) percentage error of mean from nominal.",steps:[
      {text:"Mean: <code>x̄ = (24.92+25.04+24.98+25.01+24.95)/5 = 124.90/5 = 24.98 mm</code>"},
      {text:"Deviation from nominal: <code>|24.98 − 25.00| = 0.02 mm</code>"},
      {text:"Percentage error of mean: <code>0.02/25.00 × 100 = 0.08%</code>"},
      {text:"The process is running slightly undersize (mean 24.98 < nominal 25.00). Offset cutting tool by +0.02mm to re-centre. This small bias, while within tolerance, wastes material and indicates process drift."}
    ],answer:"Mean = 24.98mm; % error = 0.08%. Process is slightly undersize — adjust tool offset by +0.02mm. Low % error but systematic bias suggests machine thermal drift or worn tooling."}
  ],
  diagrams:[
    {title:"FMEA Scoring Matrix — Interpretation Guide",steps:[
      "Severity scale (1–10): 1=no effect; 3=minor inconvenience; 5=moderate (some product lost); 7=high (product inoperable); 9=very high (safety hazard with warning); 10=hazard without warning",
      "Occurrence scale (1–10): 1=remote (1 in 1,000,000+); 3=low (1 in 100,000); 5=moderate (1 in 2,000); 7=high (1 in 100); 9=very high (1 in 10); 10=almost inevitable",
      "Detectability scale (1–10): 1=almost certain to detect; 3=high likelihood of detection; 5=moderate; 7=low detection chance; 9=very unlikely to detect; 10=no detection method",
      "Key: Detectability is INVERTED — high number means HARD to detect (high risk). This is the most commonly confused scale",
      "RPN = S × O × D. Plot on a matrix: x-axis = Severity, y-axis = Occurrence. Colour-code by RPN band: green (<50), amber (50–100), red (>100)",
      "Action: always address Severity=9 or 10 as an automatic trigger, regardless of other scores"
    ]},
    {title:"Process Capability — Visual Interpretation",steps:[
      "Draw a bell curve (normal distribution) representing the process output",
      "Mark LSL (Lower Spec Limit) and USL (Upper Spec Limit) as vertical lines on the x-axis",
      "Mark the process mean μ and show ±3σ spread (contains 99.73% of output)",
      "Cp = 1: the ±3σ spread exactly fits the tolerance band (USL−LSL). Marginal — 0.27% defects",
      "Cp = 1.33: the ±4σ spread fits the tolerance band. Good — 64 ppm defects",
      "Cpk: show process mean shifted toward USL. Even if Cp=1.33, off-centring reduces Cpk — one tail extends past USL",
      "Action arrows: if Cpk < Cp → re-centre process (adjust mean). If Cp < 1 → reduce variation (SPC, tool maintenance, better fixtures)"
    ]}
  ],
  analysis:[
    {heading:"RPN Limitations — When to Override the Number",chain:"FMEA calculates RPN = S×O×D → creates ranked priority list → BUT: a failure with Severity=9 and RPN=54 (9×2×3) is ranked lower than Severity=3 and RPN=150 (3×5×10) → the lower-severity failure gets addressed first → the catastrophic failure is ignored → this is a known flaw in the RPN method → best practice: apply automatic action rule for any Severity ≥ 9 OR apply weighted scoring that prevents low-severity failures from drowning high-severity ones",evals:["The Detectability scale is counter-intuitive and frequently misapplied — Detectability=10 means the failure CANNOT be detected, which is the HIGHEST risk. Many students write Detectability=1 for a failure that can't be detected","FMEA is only as good as the team doing it — it requires multi-disciplinary participation (design, manufacturing, quality, service) and honest assessment. An FMEA done by one person to satisfy paperwork requirements has little value","FMEA is proactive (done before problems occur) — it must be distinguished from root cause analysis (done after a problem occurs). FMEA prevents failures; RCA explains ones that have already happened"],mistake:"RPN alone is not sufficient to prioritise FMEA actions. Always apply an independent severity trigger: any failure with Severity ≥ 9 must be addressed regardless of how low its RPN appears."},
    {heading:"Process Capability — Cp vs Cpk Distinction",chain:"Process has specification 10.00 ±0.30 mm (USL=10.30, LSL=9.70) → measure process: σ=0.08mm → Cp=(0.60)/(6×0.08)=0.60/0.48=1.25 → process is capable (spread fits within spec) → but process mean μ=10.22mm → Cpk lower=(10.22−9.70)/(3×0.08)=0.52/0.24=2.17 → Cpk upper=(10.30−10.22)/(3×0.08)=0.08/0.24=0.33 → Cpk=0.33 → process is NOT capable despite good Cp — parts are piling up against USL",evals:["The fix for low Cpk with adequate Cp is simple: re-centre the process (adjust tool offset, material feed position, etc.). No improvement in process variation is needed — just accurate targeting","Cp can be improved only by reducing process variability: better tooling, tighter clamping, temperature control, fresher tooling, better material consistency","In continuous improvement, the sequence is: first achieve Cpk > 1 (process centred and capable) → then improve Cp > 1.33 (reduce variability) → then sustain through SPC monitoring"],mistake:"Never report only Cp without Cpk when the process is off-centre. A manufacturer who quotes Cp=1.8 but has a centred process running against one specification limit is misleading customers about actual capability."}
  ],
  quiz:[
    {q:"In FMEA, a Detectability score of 9 means:",opts:["The failure is almost certain to be detected before reaching the customer","The failure is very unlikely to be detected — it will almost certainly reach the customer","The failure is moderately likely to be detected","Detectability is irrelevant when Severity is below 5"],correct:1,exp:"Detectability scale is INVERTED: 10 = cannot detect (highest risk); 1 = almost certain to detect (lowest risk). A Detectability score of 9 means the failure is very difficult to detect — it will likely reach the customer. This is the most commonly misunderstood FMEA scale."},
    {q:"Process specification: 20.00 ±0.20mm. Process σ = 0.05mm. Cp is:",opts:["0.67","1.00","1.33","2.00"],correct:2,exp:"Cp = (USL−LSL)/(6σ) = (20.20−19.80)/(6×0.05) = 0.40/0.30 = 1.33. A Cp of 1.33 is considered 'good' — the process spread (±3σ = ±0.15mm) fits comfortably within the tolerance band (±0.20mm). This corresponds to approximately 64 defects per million if the process is centred."},
    {q:"Which statement about Cp vs Cpk is correct?",opts:["Cp and Cpk are always equal","Cpk can be higher than Cp when the process is off-centre","Cpk ≤ Cp always — Cpk accounts for process centering; Cp does not","Cp measures the process mean; Cpk measures the spread"],correct:2,exp:"Cpk ≤ Cp always. When the process is exactly centred (μ = (USL+LSL)/2), Cpk = Cp. When the process mean shifts toward either specification limit, Cpk < Cp. Cp measures the potential capability (if the process were centred); Cpk measures actual capability including any off-centring. A low Cpk with high Cp is fixed by re-centring (adjusting mean), not by reducing variability."},
    {q:"A production run of 2,000 parts with scrap rate 2% costs £5.00 per part to produce. The cost of poor quality (scrap cost) is:",opts:["£10","£100","£200","£2,000"],correct:2,exp:"Number scrapped: 2,000 × 0.02 = 40 parts. Scrap cost: 40 × £5.00 = £200. This is the minimum 'cost of poor quality' — it excludes rework time, inspection cost, warranty claims, and customer dissatisfaction. The total cost of quality is typically 5–30% of revenue in less mature manufacturing organisations."}
  ],
  quickPrompts:["Walk me through an FMEA calculation — what does each score represent?","Explain the difference between Cp and Cpk with a worked example","How do I reduce RPN — what can be done about each factor (S, O, D)?"]
},
{
  id:4, label:"Topic 5", dotClass:"dot-design", tagClass:"tag-design", typeLabel:"Design & Anthropometrics",
  title:"Design Calculations & Anthropometrics",
  focus:"Percentile application, grip dimensions, usability metrics, LCA calculations and sustainability",
  topics:[
    {title:"Anthropometric Calculations",body:"Anthropometric data provides body dimension measurements for defined populations. Data is given for key percentiles: 5th (smaller end), 50th (median), 95th (larger end). Designing for the 5th to 95th percentile range covers 90% of the target population. The correct percentile to use depends on the dimension type: minimum reach distances → use 5th percentile (smallest reach); maximum clearance dimensions (leg room, head room) → use 95th percentile (largest person)."},
    {title:"Product Measurement & Scaling",body:"Scale factor: ratio between dimensions of a model/drawing and the real object. Scale 1:5 means the model is 1/5 of real size — multiply model dimensions by 5 to get real dimensions. Percentage difference: how much a measured value differs from a target. Surface area and volume scaling: if linear scale = k, then areas scale by k², volumes scale by k³."},
    {title:"Lifecycle Assessment (LCA) Calculations",body:"LCA quantifies environmental impact across all life stages: raw material extraction, manufacturing, distribution, use and end-of-life. Embodied energy: total energy consumed in producing a material (MJ/kg). Carbon footprint: total CO₂e emissions across the lifecycle (kg CO₂e). Calculating relative environmental impacts allows designers to identify which stage contributes most and where design changes will have greatest effect."},
    {title:"Product Economics & Pricing",body:"Markup: selling price = cost price × (1 + markup%). Gross margin = (selling price − cost) / selling price × 100%. Cost-benefit analysis: total benefits (over product life) vs total costs. Payback period: initial investment ÷ annual saving. Net Present Value (NPV) for long-term projects. Value engineering: reduce cost while maintaining function — identify and eliminate cost without reducing value."}
  ],
  formulas:[
    {name:"Percentile design rule (reach)",expr:"Design to 5th %ile for minimum reach distances",note:"If the smallest 5% can reach it, everyone can. Use 5th %ile anthropometric data for control placement.",units:"Dimension in mm. UK 5th %ile male stature: 1,640mm; female: 1,519mm"},
    {name:"Percentile design rule (clearance)",expr:"Design to 95th %ile for minimum clearance dimensions",note:"If the largest 5% have adequate clearance, everyone does. Used for leg room, door height, aisle width.",units:"UK 95th %ile male stature: 1,855mm; sitting shoulder height: 665mm"},
    {name:"Grip diameter (cylindrical handle)",expr:"Optimal grip ≈ 30–40mm for maximum grip force",note:"From anthropometric studies. Grip force peaks at ~35mm. Outside 20–50mm range: significant force reduction.",units:"mm. 5th %ile female hand breadth: 68mm; 95th %ile male: 95mm"},
    {name:"Scale factor",expr:"Scale = Model dimension / Real dimension  (or 1:n)",note:"1:5 scale → model is 1/5 real size. Multiply model dimensions by n to find real dimensions.",units:"Dimensionless ratio"},
    {name:"Area from scale",expr:"Real area = Model area × n²",note:"Areas scale with the square of the linear scale. 1:5 scale: real area = model area × 25.",units:"Same unit as area (mm², cm², m²)"},
    {name:"Volume from scale",expr:"Real volume = Model volume × n³",note:"Volumes scale with the cube of the linear scale. Critical for weight estimation from scale models.",units:"Same unit as volume (mm³, cm³, m³)"},
    {name:"Embodied energy of component",expr:"Total embodied energy = Mass × Embodied energy per kg",note:"Embodied energy data (MJ/kg): steel 20–35; aluminium 155–200; CFRP 200–400; timber 2–10.",units:"Total in MJ. Mass in kg. Embodied energy in MJ/kg"},
    {name:"Carbon footprint",expr:"CO₂e = Mass × Carbon intensity (kg CO₂e/kg)",note:"Carbon intensity data: steel 1.5–2.5 kg CO₂e/kg; aluminium 8–12; CFRP 20–50; timber −1.8 (sequesters carbon).",units:"kg CO₂e"},
    {name:"Selling price from markup",expr:"Selling price = Cost × (1 + markup/100)",note:"A 40% markup on £10 cost: selling price = £10 × 1.40 = £14.",units:"Same currency as cost"},
    {name:"Payback period",expr:"Payback (years) = Initial investment / Annual saving",note:"Simple payback ignores time value of money. NPV analysis is more rigorous but not always required at A Level.",units:"Years"}
  ],
  examples:[
    {q:"A control panel is designed for operators in a factory. The maximum reach distance to the furthest control must be reachable by the smallest operators. UK 5th percentile female forward reach is 650mm. A control is placed 680mm from the operator's shoulder. Is this acceptable?",steps:[
      {text:"Relevant percentile: 5th percentile (minimum reach) — if the smallest 5% can reach it, all operators can."},
      {text:"5th %ile female forward reach = 650mm. Control distance = 680mm."},
      {text:"Check: <code>680mm > 650mm</code> → the control is BEYOND the reach of the smallest operators."},
      {text:"Action: move the control to within 650mm of the operator position, OR reposition the operator workstation closer to the control panel."}
    ],answer:"NOT acceptable — 680mm exceeds the 5th percentile reach of 650mm. Approximately 5% (or more, given the mixed-gender workforce) of operators cannot safely reach this control. Redesign required."},
    {q:"A designer produces a 1:8 scale model of a product. The model measures 85mm × 60mm × 40mm. Calculate the real dimensions and the real volume compared to the model volume.",steps:[
      {text:"Real dimensions: multiply each by scale factor 8."},
      {text:"Length: <code>85 × 8 = 680mm</code>. Width: <code>60 × 8 = 480mm</code>. Height: <code>40 × 8 = 320mm</code>"},
      {text:"Model volume: <code>85 × 60 × 40 = 204,000 mm³</code>"},
      {text:"Real volume: <code>680 × 480 × 320 = 104,448,000 mm³</code>"},
      {text:"Ratio: <code>104,448,000 / 204,000 = 512 = 8³ ✓</code> — volume scales with the cube of the linear scale."}
    ],answer:"Real: 680×480×320mm. Real volume = model volume × 512 (= 8³). Always cube the linear scale factor for volume calculations — a 1:8 model is 512 times smaller in volume."},
    {q:"A chair frame uses 3.2 kg of steel (embodied energy = 28 MJ/kg, carbon intensity = 2.0 kg CO₂e/kg). An alternative design uses 1.1 kg of aluminium (embodied energy = 170 MJ/kg, carbon intensity = 10 kg CO₂e/kg). Compare the embodied energy and carbon footprint of each.",steps:[
      {text:"Steel embodied energy: <code>3.2 × 28 = 89.6 MJ</code>"},
      {text:"Aluminium embodied energy: <code>1.1 × 170 = 187 MJ</code>"},
      {text:"Steel carbon footprint: <code>3.2 × 2.0 = 6.4 kg CO₂e</code>"},
      {text:"Aluminium carbon footprint: <code>1.1 × 10 = 11.0 kg CO₂e</code>"},
      {text:"Steel is better on both metrics (less embodied energy AND lower carbon). However: aluminium is lighter (1.1 kg vs 3.2 kg) — in a transported product, the use-phase carbon saving from lower weight must be considered over the product's lifetime."}
    ],answer:"Steel: 89.6 MJ, 6.4 kg CO₂e. Aluminium: 187 MJ, 11.0 kg CO₂e. Steel is lower impact at manufacture. Full LCA would also consider use phase and end-of-life recycling rates."},
    {q:"A product costs £18.50 to manufacture. The company applies a 60% markup. Calculate: (a) the selling price, (b) the gross profit per unit, (c) the gross margin percentage.",steps:[
      {text:"(a) Selling price: <code>£18.50 × (1 + 60/100) = £18.50 × 1.60 = £29.60</code>"},
      {text:"(b) Gross profit per unit: <code>£29.60 − £18.50 = £11.10</code>"},
      {text:"(c) Gross margin: <code>(£11.10 / £29.60) × 100 = 37.5%</code>"},
      {text:"Note: 60% markup ≠ 60% margin. Markup is on cost; margin is on selling price. This is a common source of confusion in business calculations."}
    ],answer:"Selling price = £29.60; gross profit = £11.10 per unit; gross margin = 37.5%. Markup (60%) ≠ Gross margin (37.5%) — always clarify which is being asked for."},
    {q:"A more energy-efficient motor costs £350 more than a standard motor. It saves £140 per year in electricity. Calculate the payback period and state whether this is a good investment if the motor has a 10-year lifespan.",steps:[
      {text:"Payback period: <code>£350 / £140 per year = 2.5 years</code>"},
      {text:"Total savings over 10 years: <code>£140 × 10 = £1,400</code>"},
      {text:"Net saving: <code>£1,400 − £350 initial investment = £1,050 profit</code> over 10 years"},
      {text:"With a 2.5-year payback period and 10-year lifespan, the motor pays back 4× — clearly a good investment financially, AND reduces energy consumption."}
    ],answer:"Payback = 2.5 years. Excellent investment — the motor pays for itself in 2.5 years and saves £1,050 net over 10 years while reducing energy consumption. Both financial and sustainability arguments support the upgrade."}

  analysis:[
    {heading:"5th vs 95th Percentile — Applying the Correct Percentile",chain:"Identify the design dimension type → is it a REACH dimension (how far someone must extend to access something)? → use 5th %ile (smallest reach — if smallest person can reach it, all can) → is it a CLEARANCE dimension (space needed to accommodate a person)? → use 95th %ile (largest person — if largest person fits, all fit) → is it a FORCE requirement? → use 5th %ile (weakest person — if weakest can operate it, all can) → is it a VISIBILITY requirement? → consider eye height at 5th %ile",evals:["A single percentile rarely governs all dimensions of a product — a car interior must use 95th %ile for leg room (clearance) but 5th %ile for pedal reach distance (reach). Both percentiles are needed simultaneously","Adjustable products (car seats, office chairs) can accommodate a wider range by allowing the user to set the optimal position — adjustability reduces reliance on fixed percentile-based compromise","Cultural and demographic variation: UK anthropometric data does not apply globally — the same product designed for a UK 5th %ile reach may exclude a larger fraction of Southeast Asian populations who are, on average, shorter"],mistake:"The single most common error: using the 50th percentile (mean) for ALL dimensions, thinking this is best because it represents the 'average person'. Designing for the mean systematically excludes those at both extremes. The 'average person' is a statistical fiction — no single individual is average in all dimensions simultaneously."},
    {heading:"Embodied Energy vs Use-Phase Energy",chain:"Product designed with high-embodied-energy materials (aluminium, CFRP) → manufacture phase has high carbon footprint → BUT: lightweight structure reduces vehicle fuel consumption OR reduces motor power requirement → use-phase energy savings accumulate over product lifetime → at some break-even point, total lifecycle emissions of lightweight product equals then falls below heavier alternative → e.g. aluminium car body: 3× manufacturing emissions vs steel BUT 20–30% weight reduction saves fuel over 200,000km lifetime → net lifecycle advantage for aluminium",evals:["The break-even analysis requires assumed product lifetime and usage intensity — a car driven 200,000km benefits more from lightweighting than one driven 50,000km","Recycled aluminium has only 5% of primary aluminium's embodied energy — a product made from recycled content dramatically changes the lifecycle calculation","End-of-life recyclability matters: CFRP cannot currently be economically recycled (fibres are shortened, matrix is inert) — its high embodied energy is largely unrecovered. This worsens CFRP's lifecycle performance vs metals despite superior specific properties"],mistake:"Never judge a material's environmental impact based only on manufacture phase embodied energy. For products in regular use (vehicles, appliances, tools), the use-phase energy often dominates total lifecycle impact. Lightweight high-embodied-energy materials can still win on lifetime carbon."}
  ],
  quiz:[
    {q:"When designing the leg room under a workstation desk, the relevant anthropometric percentile to use is:",opts:["5th percentile — the smallest person's leg height determines the minimum","50th percentile — design for the average to suit most users","95th percentile — if the tallest person fits, everyone fits","Any percentile is acceptable — leg room is not safety-critical"],correct:2,exp:"Leg room (clearance dimension): use 95th percentile sitting thigh height. If the largest 5% have adequate clearance, everyone has sufficient space. Using the 5th or 50th percentile would leave the tallest users uncomfortable or unable to use the workstation. Rule: clearance → 95th %ile; reach → 5th %ile."},
    {q:"A 1:10 scale model has a volume of 800 cm³. The real object's volume is:",opts:["8,000 cm³","80,000 cm³","800,000 cm³","80 cm³"],correct:2,exp:"Volume scales with the CUBE of the linear scale factor. Scale = 1:10 → real volume = model volume × 10³ = 800 × 1,000 = 800,000 cm³ = 0.8 m³. This is why scale models of buildings seem lightweight — a 1:100 model is 10⁶ (one million) times smaller in volume than the real building."},
    {q:"Embodied energy of a component = 4kg of aluminium (170 MJ/kg) + 1.5kg of steel (28 MJ/kg). Total embodied energy is:",opts:["198 MJ","680 MJ","722 MJ","838 MJ"],correct:2,exp:"Aluminium: 4 × 170 = 680 MJ. Steel: 1.5 × 28 = 42 MJ. Total: 680 + 42 = 722 MJ. The aluminium dominates despite being less than 3× the mass — its embodied energy per kg is 6× higher. Reducing aluminium content would have far more impact on embodied energy than eliminating the steel."},
    {q:"A product costs £24 to make and sells for £36. The gross margin is:",opts:["50%","33.3%","66.7%","12%"],correct:1,exp:"Gross margin = (Selling price − Cost) / Selling price × 100 = (36−24)/36 × 100 = 12/36 × 100 = 33.3%. Note: the markup is (12/24)×100 = 50%. Markup is always higher than margin for the same values. Gross margin is expressed as a % of selling price; markup as a % of cost."}
  ],
