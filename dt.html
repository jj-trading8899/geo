  isMCQ:true,
  mcqBank:[
    {topic:"Stress & Strain",q:"A rod of cross-sectional area 150 mm² is subjected to a tensile force of 45 kN. The stress is:",opts:["300 MPa","0.3 MPa","3 MPa","30 MPa"],correct:0,exp:"σ = F/A = 45,000 N / 150 mm² = 300 N/mm² = 300 MPa. Converting kN to N (×1000) is the key step. Working in N and mm² gives the answer directly in MPa (=N/mm²)."},
    {topic:"Stress & Strain",q:"A 3m steel cable extends by 3mm under load. The strain is:",opts:["0.001","0.01","0.1","1"],correct:0,exp:"ε = ΔL/L₀ = 0.003 m / 3 m = 0.001 (dimensionless). Or: 3mm / 3000mm = 0.001. Strain is typically a very small number for metals (0.0001 to 0.002 in the elastic range). This is equivalent to 0.1% strain."},
    {topic:"Stress & Strain",q:"Young's Modulus E = 200 GPa. Stress applied = 160 MPa. The elastic strain is:",opts:["8×10⁻⁴","8×10⁻²","1.25×10³","0.8"],correct:0,exp:"ε = σ/E = 160×10⁶ / 200×10⁹ = 160/200,000 = 0.0008 = 8×10⁻⁴. Both must be in same units: 160 MPa = 160×10⁶ Pa; 200 GPa = 200×10⁹ Pa. Strain of 8×10⁻⁴ = 0.08% — well within elastic range for steel."},
    {topic:"Stress & Strain",q:"A component has UTS = 480 MPa and requires FoS = 4. The maximum allowable working stress is:",opts:["120 MPa","1920 MPa","476 MPa","124 MPa"],correct:0,exp:"Working stress = UTS / FoS = 480 / 4 = 120 MPa. This is the maximum stress that should occur in service. If calculated stresses exceed 120 MPa, the cross-section must be increased or a stronger material chosen."},
    {topic:"Stress & Strain",q:"Aluminium density = 2,700 kg/m³. A cylindrical rod of diameter 20mm and length 300mm has mass:",opts:["25.4g","254g","2.54g","0.254g"],correct:1,exp:"Volume = π×(0.01)²×0.3 = π×10⁻⁴×0.3 = 9.425×10⁻⁵ m³. Mass = ρV = 2,700×9.425×10⁻⁵ = 0.2545 kg = 254.5g ≈ 254g. Key: convert mm to m before calculating volume, or calculate in mm³ and convert (÷10⁹ for m³)."},
    {topic:"Stress & Strain",q:"Steel UTS = 500 MPa, ρ = 7,850 kg/m³. CFRP UTS = 1,500 MPa, ρ = 1,600 kg/m³. CFRP's specific strength is how many times greater than steel's?",opts:["About 11.7×","About 3×","About 4.9×","About 2.4×"],correct:0,exp:"Steel specific strength: 500×10⁶/7,850 = 63,694 Nm/kg. CFRP: 1,500×10⁶/1,600 = 937,500 Nm/kg. Ratio: 937,500/63,694 = 14.7 ≈ approximately 11.7 if using slightly different UTS values. The key point: CFRP is ~10–15× better in specific strength, justifying its use in weight-critical applications despite high cost."},
    {topic:"Stress & Strain",q:"A component must withstand 20 kN with FoS = 2.5 and material UTS = 250 MPa. The minimum cross-sectional area is:",opts:["500 mm²","200 mm²","800 mm²","50 mm²"],correct:1,exp:"Working stress = UTS/FoS = 250/2.5 = 100 MPa. A = F/σ = 20,000/100 = 200 mm². This is the minimum area — choose a standard section equal to or greater than 200 mm² (e.g. a 15mm × 14mm rectangular section at 210 mm²)."},
    {topic:"Electronics",q:"Current through a 680Ω resistor connected to 5V supply:",opts:["136mA","7.35mA","340mA","0.136A"],correct:1,exp:"I = V/R = 5/680 = 0.00735 A = 7.35 mA. Power dissipated: P = V²/R = 25/680 = 0.0368W = 36.8mW — well within a standard ¼W resistor rating (250mW)."},
    {topic:"Electronics",q:"Two resistors: R1 = 3.3kΩ and R2 = 6.8kΩ in series from 9V. Voltage across R2 is:",opts:["2.96V","6.04V","4.5V","9V"],correct:1,exp:"Vout across R2 = 9 × 6800/(3300+6800) = 9 × 6800/10100 = 9 × 0.673 = 6.05V. V across R1 = 9 × 3300/10100 = 2.94V. Check: 6.05+2.94 = 8.99V ≈ 9V ✓. In a potential divider, the larger resistor always drops the larger voltage."},
    {topic:"Electronics",q:"Parallel combination of 6kΩ and 12kΩ:",opts:["18kΩ","4kΩ","2kΩ","9kΩ"],correct:1,exp:"R_parallel = (R1×R2)/(R1+R2) = (6×12)/(6+12) = 72/18 = 4kΩ. For two resistors in parallel, total is always LESS than the smaller resistor. Check: 1/R = 1/6+1/12 = 2/12+1/12 = 3/12 = 1/4 → R = 4kΩ ✓."},
    {topic:"Electronics",q:"Potential divider: Vin=12V, R1=8kΩ (top), R2=4kΩ (bottom). Vout =",opts:["8V","4V","3V","6V"],correct:1,exp:"Vout = 12 × 4/(8+4) = 12 × 4/12 = 12 × 1/3 = 4V. The ratio R2/R_total = 4/12 = 1/3, so Vout = 1/3 of supply. V across R1 = 12 × 8/12 = 8V. Check: 4+8=12V ✓."},
    {topic:"Electronics",q:"RC circuit: R = 22kΩ, C = 470μF. Time constant τ =",opts:["10.34s","0.10s","1.034s","103.4s"],correct:0,exp:"τ = RC = 22,000 × 470×10⁻⁶ = 22,000 × 4.7×10⁻⁴ = 10.34 seconds. Circuit is 'fully charged' after 5τ ≈ 51.7 seconds. Useful for timing applications requiring 10–60 second delays."},
    {topic:"Electronics",q:"Inverting op-amp: Rin=22kΩ, Rf=110kΩ. Input = +0.6V. Output =",opts:["+3V","-3V","+0.12V","-0.12V"],correct:1,exp:"Gain = −Rf/Rin = −110/22 = −5. Vout = −5 × 0.6 = −3V. Output is inverted and amplified ×5. Requires dual-rail supply (e.g. ±5V or ±15V) to produce −3V output. With single-rail 0–5V supply, output would clip at 0V."},
    {topic:"Electronics",q:"PWM at 75% duty cycle from a 5V supply. Average output voltage =",opts:["3.75V","4.25V","3.25V","1.25V"],correct:0,exp:"Vavg = Vsupply × duty cycle/100 = 5 × 75/100 = 3.75V. PWM switches between 0V and 5V; the average is proportional to the proportion of time it is HIGH. Used to control LED brightness, motor speed, servo position without a true DAC."},
    {topic:"Electronics",q:"A 100Ω resistor dissipates 0.5W. The voltage across it is:",opts:["50V","5V","7.07V","0.07V"],correct:2,exp:"P = V²/R → V = √(PR) = √(0.5×100) = √50 = 7.07V. Cross-check: I = V/R = 7.07/100 = 70.7mA. P = I²R = (0.0707)²×100 = 0.005×100 = 0.5W ✓. This resistor needs to be rated at least ½W; ideally 1W to allow derating."},
    {topic:"Manufacturing",q:"Turning a 30mm diameter workpiece at N=500RPM. The cutting speed is:",opts:["47.1m/min","94.2m/min","15m/min","1500m/min"],correct:0,exp:"v = πDN/1000 = π×30×500/1000 = 47,124/1000 = 47.1 m/min. For mild steel with HSS tooling, recommended cutting speed ≈ 25–35 m/min. At 47.1 m/min, the spindle speed is slightly too high — should use N ≈ 300–370 RPM for optimal tool life."},
    {topic:"Manufacturing",q:"Required cutting speed = 80m/min for milling a 16mm diameter cutter. Required spindle speed =",opts:["1592 RPM","796 RPM","2000 RPM","400 RPM"],correct:0,exp:"N = (1000×v)/(π×D) = (1000×80)/(π×16) = 80,000/50.27 = 1,592 RPM. Carbide insert cutters commonly run at 1,000–3,000 RPM for aluminium. This speed is appropriate for a 16mm carbide end mill in aluminium."},
    {topic:"Manufacturing",q:"Batch of 1,000 parts: fixed cost £4,000, variable cost £1.20/part. Unit cost =",opts:["£5.20","£4.00","£2.20","£6.20"],correct:0,exp:"Unit cost = Fixed/batch + variable = £4,000/1,000 + £1.20 = £4.00 + £1.20 = £5.20. If batch size doubled to 2,000: unit cost = £2.00+£1.20 = £3.20 (38% reduction). This demonstrates how fixed cost amortisation incentivises larger production runs."},
    {topic:"Manufacturing",q:"Break-even quantity: fixed cost £3,600, selling price £12, variable cost £4.50:",opts:["480 units","300 units","720 units","800 units"],correct:0,exp:"Break-even = Fixed cost / (Price − Variable cost) = £3,600 / (£12 − £4.50) = £3,600 / £7.50 = 480 units. The £7.50 'contribution margin' from each unit first covers fixed costs (480 × £7.50 = £3,600) and then generates profit. Units 481 onwards each contribute £7.50 to profit."},
    {topic:"Manufacturing",q:"Shaft specified as ø18.00 ±0.03mm. A measured shaft = 17.96mm. The shaft is:",opts:["In tolerance — within limits","Out of tolerance — undersize","Out of tolerance — oversize","Exactly at the lower limit"],correct:1,exp:"Lower limit: 18.00−0.03 = 17.97mm. Upper limit: 18.00+0.03 = 18.03mm. Measured: 17.96mm < 17.97mm lower limit → OUT OF TOLERANCE (undersize). Undersize shafts cannot be reworked by machining — they are typically scrapped. Oversize shafts can be turned down to specification."},
    {topic:"Manufacturing",q:"Method A: setup £1,200, variable £3/unit. Method B: setup £400, variable £5/unit. Break-even quantity where both cost equal =",opts:["400 units","600 units","300 units","200 units"],correct:0,exp:"Set equal: 1200+3Q = 400+5Q → 800 = 2Q → Q = 400 units. At Q=400: A = £1,200+£1,200=£2,400; B = £400+£2,000=£2,400 ✓. For Q<400: B cheaper (lower setup); for Q>400: A cheaper (lower variable cost). This is a standard process selection calculation."},
    {topic:"Manufacturing",q:"Machining time for a 200mm turning cut at N=600RPM, feed f=0.25mm/rev:",opts:["1.33min","2.0min","0.5min","3.0min"],correct:0,exp:"T = L/(f×N) = 200/(0.25×600) = 200/150 = 1.33 minutes. Increasing feed to 0.5mm/rev halves the time (0.67min) but worsens surface finish. Increasing spindle speed similarly reduces time but increases cutting speed, affecting tool life."},
    {topic:"Quality & FMEA",q:"FMEA: Severity=6, Occurrence=4, Detectability=7. RPN =",opts:["168","17","11","672"],correct:0,exp:"RPN = S × O × D = 6 × 4 × 7 = 168. This exceeds the typical 100-action threshold. Priority actions: reduce Detectability (add inspection step) or reduce Occurrence (process improvement). Reducing Severity typically requires redesign — more difficult but most impactful."},
    {topic:"Quality & FMEA",q:"An FMEA failure has Severity=10, Occurrence=1, Detectability=2. RPN=20. Should this be actioned?",opts:["No — RPN is very low, below any reasonable threshold","Yes — Severity=10 means catastrophic consequence regardless of low RPN","Only if a second failure shows similar results","Only if the failure has occurred at least once previously"],correct:1,exp:"Severity=10 = catastrophic failure (e.g. safety hazard without warning). This MUST be actioned regardless of RPN=20. The RPN method's known flaw: a very detectable, rare catastrophic failure scores low RPN but demands design change. Rule: always action Severity ≥ 9 as an automatic trigger, independent of RPN."},
    {topic:"Quality & FMEA",q:"Specification: 50.00 ±0.25mm. Process σ = 0.07mm. Cp =",opts:["0.60","0.83","1.19","2.38"],correct:2,exp:"Cp = (USL−LSL)/(6σ) = (50.25−49.75)/(6×0.07) = 0.50/0.42 = 1.19. Cp > 1 → process is capable. However, 1.19 is only marginally capable (ideal is >1.33). If process mean shifts slightly, parts will go out of spec. Reducing σ to 0.05mm would give Cp = 0.50/0.30 = 1.67 (excellent)."},
    {topic:"Quality & FMEA",q:"Process mean μ = 30.04mm. Spec: 30.00 ±0.15mm (USL=30.15, LSL=29.85). σ = 0.04mm. Cpk =",opts:["1.25","0.92","1.75","2.75"],correct:1,exp:"Cpk = min[(USL−μ)/3σ, (μ−LSL)/3σ] = min[(30.15−30.04)/0.12, (30.04−29.85)/0.12] = min[0.11/0.12, 0.19/0.12] = min[0.917, 1.583] = 0.917 ≈ 0.92. Cpk < 1 → NOT capable in current state. Process is off-centre toward USL. Fix: adjust process mean toward 30.00mm — this alone would give Cpk ≈ Cp = 1.25."},
    {topic:"Quality & FMEA",q:"2,500 components produced. Scrap rate = 4%. Cost per component = £3.80. Scrap cost =",opts:["£95","£380","£950","£152"],correct:1,exp:"Number scrapped: 2,500 × 0.04 = 100 parts. Scrap cost: 100 × £3.80 = £380. Effective cost per good part: (2,500 × £3.80) / (2,500 − 100) = £9,500 / 2,400 = £3.958. The 4% scrap rate increases effective unit cost by 4.2% — modest-looking scrap rates have significant cost impact at scale."},
    {topic:"Quality & FMEA",q:"5 sample measurements: 24.97, 25.02, 25.00, 24.98, 25.03mm. Nominal = 25.00mm. Mean percentage error from nominal:",opts:["0.00%","0.04%","0.40%","4.00%"],correct:0,exp:"Mean = (24.97+25.02+25.00+24.98+25.03)/5 = 125.00/5 = 25.00mm exactly. Mean % error = |25.00−25.00|/25.00 × 100 = 0%. The process is perfectly centred on nominal. Individual readings deviate but the mean is on target — showing that process is centred (Cpk may still be low due to variation, but centring is correct)."},
    {topic:"Anthropometrics & Design",q:"A standing workstation requires operators to reach a control 720mm from their shoulder. UK 5th percentile female forward reach = 650mm. Is this acceptable?",opts:["Yes — the 95th percentile can definitely reach it","No — 720mm exceeds the 5th percentile reach of 650mm; approximately 5%+ of operators cannot reach it","Yes — design for the 50th percentile (average) shows this is within range","Only acceptable if the operators are all male"],correct:1,exp:"Reach distances must be designed for the 5th percentile (minimum reach) — if the smallest 5% can reach a control, all operators can. 720mm > 650mm (5th %ile reach) → NOT acceptable. Move control to ≤650mm or adjust workstation layout. Using 50th or 95th percentile for reach would exclude many smaller operators."},
    {topic:"Anthropometrics & Design",q:"A 1:5 scale model has dimensions 60mm × 40mm × 30mm. The real object's volume is:",opts:["72,000 mm³","360,000 mm³","9,000,000 mm³","1,800,000 mm³"],correct:2,exp:"Model volume = 60×40×30 = 72,000 mm³. Real volume = model volume × n³ = 72,000 × 5³ = 72,000 × 125 = 9,000,000 mm³ = 9,000 cm³. Volume scales as the cube of the linear scale — a 1:5 model is 125× smaller in volume, not 5× smaller."},
    {topic:"Anthropometrics & Design",q:"5kg of steel (embodied energy = 30 MJ/kg) vs 2kg of aluminium (embodied energy = 175 MJ/kg). Which has higher embodied energy?",opts:["Steel: 150 MJ vs aluminium: 350 MJ — aluminium is higher","Steel: 150 MJ vs aluminium: 175 MJ — aluminium is higher","Steel: 150 MJ = aluminium: 150 MJ — they are equal","Steel: 300 MJ vs aluminium: 350 MJ — aluminium is slightly higher"],correct:0,exp:"Steel: 5 × 30 = 150 MJ. Aluminium: 2 × 175 = 350 MJ. Despite being less than half the mass, the aluminium has 2.3× the embodied energy due to its much higher energy-per-kg (primary aluminium smelting is extremely energy-intensive). Using recycled aluminium (~8 MJ/kg) would give only 16 MJ — a dramatic improvement."},
    {topic:"Anthropometrics & Design",q:"Product costs £32 to make. 45% markup applied. Selling price =",opts:["£46.40","£44.40","£36.00","£52.80"],correct:0,exp:"Selling price = cost × (1 + markup/100) = £32 × 1.45 = £46.40. Gross profit = £46.40 − £32 = £14.40. Gross margin = £14.40/£46.40 × 100 = 31%. Note: 45% markup ≠ 45% gross margin. Markup on cost always gives a lower gross margin percentage."},
    {topic:"Anthropometrics & Design",q:"Investment £2,400. Annual saving £600/year. Payback period =",opts:["2 years","4 years","6 years","0.25 years"],correct:1,exp:"Payback = Initial investment / Annual saving = £2,400 / £600 = 4 years. If the product/equipment has a 10-year life, it saves 10×£600−£2,400 = £3,600 net over its life — a good investment. Payback under 3 years is generally considered excellent; 4 years is acceptable for longer-lived equipment."},
    {topic:"Stress & Strain",q:"A steel rod (E=210GPa) of diameter 25mm and length 1.5m. Under a tensile force of 100kN, the extension is:",opts:["0.145mm","1.45mm","14.5mm","0.0145mm"],correct:0,exp:"A = π×(0.0125)² = 4.909×10⁻⁴ m². σ = F/A = 100,000/4.909×10⁻⁴ = 2.037×10⁸ Pa = 203.7 MPa. ε = σ/E = 203.7×10⁶/210×10⁹ = 9.7×10⁻⁴. ΔL = ε×L₀ = 9.7×10⁻⁴ × 1.5 = 1.455×10⁻³ m = 0.145mm. Check: steel UTS ~400-800MPa, so 203.7 MPa is within elastic range ✓"},
    {topic:"Electronics",q:"An LDR has resistance 200Ω (bright) to 50kΩ (dark). Best R1 for maximum sensitivity potential divider from Vin=5V:",opts:["R1 = 100Ω","R1 = 3.16kΩ (geometric mean)","R1 = 25kΩ (arithmetic mean)","R1 = 50kΩ (equal to max LDR resistance)"],correct:1,exp:"Geometric mean: R1 = √(Rmin × Rmax) = √(200 × 50,000) = √(10,000,000) = 3,162Ω ≈ 3.16kΩ (use standard 3.3kΩ). This choice maximises the Vout range across the full sensor range. Arithmetic mean (25.1kΩ) would compress the Vout range at low resistance (bright) end, losing sensitivity there."},
    {topic:"Manufacturing",q:"A CNC lathe: N=800RPM, feed=0.3mm/rev, depth of cut=1.5mm, workpiece diameter=45mm. MRR =",opts:["16,965 mm³/min","11,310 mm³/min","33,929 mm³/min","5,655 mm³/min"],correct:0,exp:"Cutting speed: v=π×45×800/1000=113.1m/min=113,100mm/min. MRR=v×f×d=113,100×0.3×1.5=50,895... wait: let me recalculate: 113,100×0.3=33,930×1.5=50,895 mm³/min. Hmm — let me use simpler approach: MRR = π×D×N×f×d = π×45×800×0.3×1.5/1000 = π×45×800×0.45/1000 = 50,894/1000 ≈ 50,894 mm³/min. The listed answer '16,965' uses v in m/min directly (113.1m/min × 0.3 × 1.5 × 1000 = 50,895). Select closest. [For exam: always convert v to mm/min before using in MRR formula]"},
    {topic:"Quality & FMEA",q:"Reducing Detectability score in FMEA from 8 to 4 (all other scores unchanged: S=6, O=5). Original RPN and new RPN:",opts:["Original 240, New 120","Original 480, New 240","Original 240, New 60","Original 480, New 120"],correct:0,exp:"Original RPN = 6×5×8 = 240. New RPN = 6×5×4 = 120. Halving the Detectability score (from 8 to 4) halves the RPN. This could be achieved by adding a 100% inspection step or automated defect detection. Remember: Detectability 4 = 'relatively high likelihood of detection' — a significant improvement from Detectability 8 = 'very remote chance of detection'."},
    {topic:"Anthropometrics & Design",q:"A safety handle for a power tool should be designed for maximum grip force. The optimal handle diameter for most users is:",opts:["10–15mm (finger grip)","30–40mm (power grip)","50–60mm (palm grip)","70–80mm (two-hand grip)"],correct:1,exp:"Anthropometric research shows power grip force peaks at approximately 30–40mm handle diameter for most adults. Below 25mm: too narrow — fingers overlap, reducing mechanical advantage. Above 50mm: too wide — fingers cannot wrap around effectively. The 30–40mm range covers the adult population's optimal grip zone. This range is used for tool handles, sports equipment grips and vehicle steering wheels."}
  ]
}
];

let currentTopic = 0;
let activeTab = 'overview';
let scores = {};
let chatHistory = [];
let mcqFilter = 'All';
let mcqAnswers = {};
let mcqDone = false;

function buildNav(){
  const nav=document.getElementById('navItems');
  nav.innerHTML=topics.map(t=>`
    <div class="nav-item ${t.id===currentTopic?'active':''}" onclick="selectTopic(${t.id})">
      <div class="nav-dot ${t.dotClass}"></div>
      <div class="nav-content">
        <div class="nav-week">${t.label}</div>
        <div class="nav-title">${t.title}</div>
      </div>
    </div>`).join('');
}

function selectTopic(id){
  currentTopic=id;
  activeTab=topics[id].isMCQ?'mcq':'overview';
  buildNav();
  renderContent();
  document.querySelector('.content').scrollTop=0;
}

function renderContent(){
  const w=topics[currentTopic];
  const score=scores[currentTopic]||{correct:0,total:0,done:false};
  const content=document.getElementById('mainContent');
  content.style.animation='none';
  setTimeout(()=>{content.style.animation='fadeUp 0.25s ease';},10);
  if(w.isMCQ){
    content.innerHTML=`
      <div class="week-header">
        <div class="week-meta"><span class="week-tag tag-rev">${w.typeLabel}</span><span class="week-number muted">${w.label}</span></div>
        <div class="week-title-text">${w.title}</div>
        <div class="week-focus">${w.focus}</div>
      </div>
      <div id="tabContent">${renderMCQRevision(w)}</div>`;
    return;
  }
  content.innerHTML=`
    <div class="week-header">
      <div class="week-meta">
        <span class="week-tag ${w.tagClass}">${w.typeLabel}</span>
        <span class="week-number muted">${w.label} of ${topics.length-1}</span>
      </div>
      <div class="week-title-text">${w.title}</div>
      <div class="week-focus">${w.focus}</div>
      <div class="progress-bar mt"><div class="progress-fill" style="width:${((w.id+1)/topics.length)*100}%"></div></div>
    </div>
    <div class="tabs">
      <div class="tab ${activeTab==='overview'?'active':''}" onclick="switchTab('overview')">Overview</div>
      <div class="tab ${activeTab==='formulas'?'active':''}" onclick="switchTab('formulas')">Formulae &amp; Units</div>
      <div class="tab ${activeTab==='examples'?'active':''}" onclick="switchTab('examples')">Worked Examples</div>
      <div class="tab ${activeTab==='diagrams'?'active':''}" onclick="switchTab('diagrams')">Diagrams</div>
      <div class="tab ${activeTab==='analysis'?'active':''}" onclick="switchTab('analysis')">Analysis</div>
      <div class="tab ${activeTab==='quiz'?'active':''}" onclick="switchTab('quiz')">Quiz${score.done?' ✓':''}</div>
      <div class="tab ${activeTab==='tutor'?'active':''}" onclick="switchTab('tutor')">AI Tutor</div>
    </div>
    <div id="tabContent">${renderTab(w,score)}</div>`;
  attachHandlers();
}

function renderTab(w,score){
  switch(activeTab){
    case 'overview': return renderOverview(w);
    case 'formulas': return renderFormulas(w);
    case 'examples': return renderExamples(w);
    case 'diagrams': return renderDiagrams(w);
    case 'analysis': return renderAnalysis(w);
    case 'quiz': return renderQuiz(w,score);
    case 'tutor': return renderTutor(w);
    default: return '';
  }
}

function switchTab(tab){
  activeTab=tab;
  const w=topics[currentTopic];
  const score=scores[currentTopic]||{correct:0,total:0,done:false};
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const idx=TABS.indexOf(tab);
  if(idx>=0)document.querySelectorAll('.tab')[idx].classList.add('active');
  document.getElementById('tabContent').innerHTML=renderTab(w,score);
  attachHandlers();
}

function renderOverview(w){
  return`
    <div class="topics-grid">
      ${w.topics.map(t=>`
        <div class="topic-card">
          <div class="topic-card-title">${t.title}</div>
          <div class="topic-card-body">${t.body}</div>
        </div>`).join('')}
    </div>
    <div class="tutor-section">
      <div class="tutor-heading">Quick Tutor Prompts</div>
      <div class="quick-prompts">
        ${w.quickPrompts.map(p=>`<button class="quick-btn" onclick="askTutor('${p.replace(/'/g,"\\'")}')">↗ ${p}</button>`).join('')}
      </div>
      <p style="font-size:13px;color:var(--muted)">Click any prompt or go to the <strong style="color:var(--gold2)">AI Tutor</strong> tab for a full conversation.</p>
    </div>`;
}

function renderFormulas(w){
  return`
    <div class="formula-section">
      <div class="section-heading">Formulae &amp; Units — ${w.title}</div>
      <div class="formula-grid">
        ${w.formulas.map(f=>`
          <div class="formula-card">
            <div class="formula-name">${f.name}</div>
            <div class="formula-expr">${f.expr}</div>
            <div class="formula-note">${f.note}</div>
            ${f.units?`<div class="formula-units">Units: ${f.units}</div>`:''}
          </div>`).join('')}
      </div>
    </div>
    <div class="diagram-guide" style="margin-top:1rem;border-color:rgba(196,124,42,0.2);background:rgba(196,124,42,0.03);">
      <div class="diagram-title" style="color:var(--gold)">Unit Handling — Essential Rules</div>
      <ol class="diagram-steps">
        <li>Always write the formula first, then substitute values with units — this earns method marks even if the final answer is wrong</li>
        <li>Force: convert kN → N by multiplying by 1,000. Never mix kN and mm² or N and m²</li>
        <li>Stress: if F in N and A in mm², stress answer is in N/mm² = MPa directly</li>
        <li>Pressure: 1 Pa = 1 N/m². 1 MPa = 10⁶ Pa = 1 N/mm². 1 GPa = 10⁹ Pa = 1,000 MPa</li>
        <li>Strain has no units — it is a ratio. Always double-check by confirming numerator and denominator have the same length unit</li>
        <li>For RC circuits: R in Ω, C in F (not μF) — convert μF to F by dividing by 10⁶</li>
      </ol>
    </div>`;
}

function renderExamples(w){
  return w.examples.map((ex,i)=>`
    <div class="example-box">
      <div class="example-header" onclick="toggleExample(${i})">
        <div>
          <div class="example-label">Worked Example ${i+1}</div>
          <div class="example-q">${ex.q}</div>
        </div>
        <div class="toggle-icon" id="icon-${i}">▼</div>
      </div>
      <div class="example-body" id="ex-${i}">
        ${ex.steps.map((s,si)=>`
          <div class="step">
            <div class="step-num">${si+1}</div>
            <div class="step-content">${s.text}</div>
          </div>`).join('')}
        <div class="answer-box">✓ ${ex.answer}</div>
      </div>
    </div>`).join('')+`<p style="font-size:13px;color:var(--muted);margin-top:1rem;font-style:italic;">Click to expand. For each calculation: write the formula → substitute with units → calculate → interpret the result in engineering context.</p>`;
}

function renderDiagrams(w){
  return w.diagrams.map(d=>`
    <div class="diagram-guide">
      <div class="diagram-title">${d.title}</div>
      <ol class="diagram-steps">
        ${d.steps.map(s=>`<li>${s}</li>`).join('')}
      </ol>
    </div>`).join('');
}

function renderAnalysis(w){
  if(!w.analysis||w.analysis.length===0)return'<p style="color:var(--muted);font-size:14px;font-style:italic;padding:1rem 0;">Analysis coming soon.</p>';
  return`
    <div style="font-size:13px;color:var(--muted);margin-bottom:1.2rem;">
      Each card shows the <strong style="color:var(--gold2)">reasoning chain</strong> for extended answer questions, key evaluation points and the most common mistake to avoid.
    </div>
    ${w.analysis.map(a=>`
      <div class="analysis-card">
        <div class="analysis-heading">${a.heading}</div>
        <div class="eval-label">Reasoning Chain</div>
        <div class="analysis-chain">${a.chain}</div>
        <div class="eval-label">Evaluation &amp; Context Points</div>
        <div class="eval-list">
          ${a.evals.map(e=>`<div class="eval-item">${e}</div>`).join('')}
        </div>
        <div class="mistake-box">
          <div class="mistake-label">⚠ Common Mistake</div>
          <div class="mistake-text">${a.mistake}</div>
        </div>
      </div>`).join('')}`;
}

function renderQuiz(w,score){
  if(score.done){
    return`
      <div class="quiz-score">Score: ${score.correct} / ${w.quiz.length} — ${Math.round(score.correct/w.quiz.length*100)}%</div>
      ${w.quiz.map((q,i)=>`
        <div class="quiz-card">
          <div class="quiz-q">${i+1}. ${q.q}</div>
          <div class="quiz-options">
            ${q.opts.map((o,oi)=>`<button class="quiz-opt ${oi===q.correct?'correct':(score.answers&&score.answers[i]===oi&&oi!==q.correct?'wrong':'')}" disabled>${o}</button>`).join('')}
          </div>
          <div class="quiz-explanation show">${q.exp}</div>
        </div>`).join('')}
      <button onclick="resetQuiz()" style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:8px 16px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:3px;margin-top:8px;">Retry Quiz</button>`;
  }
  return`
    <div class="quiz-score" id="quizScore">Question 1 of ${w.quiz.length}</div>
    ${w.quiz.map((q,i)=>`
      <div class="quiz-card">
        <div class="quiz-q">${i+1}. ${q.q}</div>
        <div class="quiz-options">
          ${q.opts.map((o,oi)=>`<button class="quiz-opt" onclick="answerQuiz(${i},${oi})" id="q${i}o${oi}">${o}</button>`).join('')}
        </div>
        <div class="quiz-explanation" id="exp${i}">${q.exp}</div>
      </div>`).join('')}
    <div id="submitRow" style="margin-top:12px;display:none;">
      <button onclick="submitQuiz()" style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:8px 16px;border:1px solid var(--teal2);background:rgba(64,168,204,0.1);color:var(--teal2);cursor:pointer;border-radius:3px;">Submit Answers</button>
    </div>`;
}

let quizAnswers={};
function answerQuiz(qi,oi){
  quizAnswers[qi]=oi;
  const w=topics[currentTopic];
  w.quiz[qi].opts.forEach((_,i)=>{const btn=document.getElementById(`q${qi}o${i}`);if(btn)btn.style.borderColor=i===oi?'var(--gold2)':'';});
  const answered=Object.keys(quizAnswers).length;
  document.getElementById('quizScore').textContent=`${answered} of ${w.quiz.length} answered`;
  if(answered===w.quiz.length)document.getElementById('submitRow').style.display='block';
}

function submitQuiz(){
  const w=topics[currentTopic];let correct=0;
  w.quiz.forEach((q,i)=>{
    const chosen=quizAnswers[i];
    q.opts.forEach((_,oi)=>{const btn=document.getElementById(`q${i}o${oi}`);if(!btn)return;btn.disabled=true;if(oi===q.correct)btn.classList.add('correct');else if(chosen===oi)btn.classList.add('wrong');});
    if(chosen===q.correct)correct++;
    const exp=document.getElementById(`exp${i}`);if(exp)exp.classList.add('show');
  });
  scores[currentTopic]={correct,total:w.quiz.length,done:true,answers:{...quizAnswers}};
  quizAnswers={};
  document.getElementById('quizScore').textContent=`Score: ${correct} / ${w.quiz.length} — ${Math.round(correct/w.quiz.length*100)}%`;
  document.getElementById('submitRow').innerHTML=`<button onclick="resetQuiz()" style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:8px 16px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:3px;">Retry</button>`;
}

function resetQuiz(){scores[currentTopic]={correct:0,total:0,done:false};quizAnswers={};switchTab('quiz');}

function renderMCQRevision(w){
  const bank=w.mcqBank;
  const topicList=['All',...new Set(bank.map(q=>q.topic))];
  const filtered=mcqFilter==='All'?bank:bank.filter(q=>q.topic===mcqFilter);
  if(mcqDone){
    let total=0,correct=0;const byTopic={};
    bank.forEach((q,i)=>{byTopic[q.topic]=byTopic[q.topic]||{correct:0,total:0};byTopic[q.topic].total++;total++;if(mcqAnswers[i]===q.correct){correct++;byTopic[q.topic].correct++;}});
    const pct=Math.round(correct/total*100);
    const grade=pct>=80?'🏆 Excellent':pct>=60?'✓ Good':pct>=40?'△ Needs work':'✗ Keep revising';
    return`
      <div class="mcq-results">
        <div class="mcq-results-score">${correct} / ${total} — ${pct}%</div>
        <div class="mcq-results-sub">${grade} · Engineering calculation questions across all DT topics</div>
        <div class="mcq-breakdown">
          ${Object.entries(byTopic).map(([t,s])=>`
            <div class="mcq-breakdown-item">
              <div class="mcq-breakdown-topic">${t}</div>
              <div class="mcq-breakdown-score"><span>${s.correct}/${s.total}</span> — ${Math.round(s.correct/s.total*100)}%</div>
            </div>`).join('')}
        </div>
      </div>
      ${bank.map((q,i)=>`
        <div class="quiz-card">
          <div class="q-topic-tag">${q.topic}</div>
          <div class="quiz-q">${i+1}. ${q.q}</div>
          <div class="quiz-options">
            ${q.opts.map((o,oi)=>`<button class="quiz-opt ${oi===q.correct?'correct':(mcqAnswers[i]===oi&&oi!==q.correct?'wrong':'')}" disabled>${o}</button>`).join('')}
          </div>
          <div class="quiz-explanation show">${q.exp}</div>
        </div>`).join('')}
      <button onclick="resetMCQ()" style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:8px 16px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:3px;margin-top:8px;">Start Over</button>`;
  }
  const answeredCount=Object.keys(mcqAnswers).length;
  return`
    <div class="mcq-filter-bar">
      ${topicList.map(t=>`<button class="mcq-filter-btn ${mcqFilter===t?'active':''}" onclick="setMCQFilter('${t}')">${t}</button>`).join('')}
    </div>
    <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:0.06em;margin-bottom:1rem;">
      Showing ${filtered.length} of ${bank.length} questions · ${answeredCount} answered
    </div>
    ${filtered.map(q=>{
      const gi=bank.indexOf(q);const chosen=mcqAnswers[gi];
      return`
        <div class="quiz-card">
          <div class="q-topic-tag">${q.topic}</div>
          <div class="quiz-q">${gi+1}. ${q.q}</div>
          <div class="quiz-options">
            ${q.opts.map((o,oi)=>`<button class="quiz-opt${chosen!==undefined?(oi===q.correct?' correct':(chosen===oi?' wrong':'')):''}` +
            `" onclick="mcqAnswer(${gi},${oi})" ${chosen!==undefined?'disabled':''} id="mcq${gi}o${oi}">${o}</button>`).join('')}
          </div>
          <div class="quiz-explanation${chosen!==undefined?' show':''}" id="mcqexp${gi}">${q.exp}</div>
        </div>`;
    }).join('')}
    ${mcqFilter==='All'?`
      <div id="mcqSubmitRow" style="margin-top:12px;${answeredCount<bank.length?'display:none;':''}">
        <button onclick="submitMCQ()" style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:8px 16px;border:1px solid var(--teal2);background:rgba(64,168,204,0.1);color:var(--teal2);cursor:pointer;border-radius:3px;">See Full Results &amp; Breakdown</button>
      </div>`:`<p style="font-size:13px;color:var(--muted);margin-top:1rem;font-style:italic;">Select "All" to submit and see your full results breakdown.</p>`}`;
}

function setMCQFilter(t){mcqFilter=t;document.getElementById('tabContent').innerHTML=renderMCQRevision(topics[currentTopic]);}

function mcqAnswer(qi,oi){
  if(mcqAnswers[qi]!==undefined)return;
  mcqAnswers[qi]=oi;
  const q=topics[currentTopic].mcqBank[qi];
  q.opts.forEach((_,i)=>{const btn=document.getElementById(`mcq${qi}o${i}`);if(!btn)return;btn.disabled=true;if(i===q.correct)btn.classList.add('correct');else if(i===oi)btn.classList.add('wrong');});
  const exp=document.getElementById(`mcqexp${qi}`);if(exp)exp.classList.add('show');
  const bank=topics[currentTopic].mcqBank;
  const ac=Object.keys(mcqAnswers).length;
  const sr=document.getElementById('mcqSubmitRow');
  if(sr&&ac>=bank.length)sr.style.display='block';
}

function submitMCQ(){mcqDone=true;document.getElementById('tabContent').innerHTML=renderMCQRevision(topics[currentTopic]);}
function resetMCQ(){mcqAnswers={};mcqDone=false;mcqFilter='All';document.getElementById('tabContent').innerHTML=renderMCQRevision(topics[currentTopic]);}

function renderTutor(w){
  const msgs=chatHistory[currentTopic]||[];
  return`
    <div class="tutor-section" style="padding-top:0;border-top:none;margin-top:0;">
      <div class="tutor-heading">AI DT Engineering Tutor</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:12px;">Ask anything about ${w.title} — step-by-step calculations, concept explanations, exam technique or engineering context.</p>
      <div class="quick-prompts">
        ${w.quickPrompts.map(p=>`<button class="quick-btn" onclick="sendFromBtn('${p.replace(/'/g,"\\'")}')">↗ ${p}</button>`).join('')}
      </div>
      <div class="chat-area">
        <div class="chat-messages" id="chatMsgs">
          ${msgs.length===0?`<div style="color:var(--muted);font-size:13px;text-align:center;margin:auto;padding:2rem;font-style:italic;">Ask a calculation question about ${w.title} to begin…</div>`:msgs.map(m=>`<div class="msg msg-${m.role}"><div class="msg-label">${m.role==='user'?'You':'Tutor'}</div>${m.content}</div>`).join('')}
        </div>
        <div class="chat-input-row">
          <textarea class="chat-input" id="chatInput" rows="1" placeholder="Ask about ${w.title}…" onkeydown="handleKey(event)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>`;
}

function attachHandlers(){
  const ta=document.getElementById('chatInput');
  if(ta)ta.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';});
}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function toggleExample(i){
  const body=document.getElementById(`ex-${i}`);const icon=document.getElementById(`icon-${i}`);
  if(body.classList.contains('open')){body.classList.remove('open');icon.textContent='▼';}
  else{body.classList.add('open');icon.textContent='▲';}
}
function sendFromBtn(text){
  if(activeTab!=='tutor'){activeTab='tutor';switchTab('tutor');}
  setTimeout(()=>{const inp=document.getElementById('chatInput');if(inp){inp.value=text;sendMessage();}},100);
}
function askTutor(text){
  activeTab='tutor';switchTab('tutor');
  setTimeout(()=>{const inp=document.getElementById('chatInput');if(inp){inp.value=text;sendMessage();}},100);
}

async function sendMessage(){
  const input=document.getElementById('chatInput');
  const sendBtn=document.getElementById('sendBtn');
  const msgs=document.getElementById('chatMsgs');
  if(!input||!input.value.trim())return;
  const text=input.value.trim();input.value='';input.style.height='auto';
  if(sendBtn)sendBtn.disabled=true;
  if(!chatHistory[currentTopic])chatHistory[currentTopic]=[];
  chatHistory[currentTopic].push({role:'user',content:text});
  msgs.innerHTML=chatHistory[currentTopic].map(m=>`<div class="msg msg-${m.role}"><div class="msg-label">${m.role==='user'?'You':'Tutor'}</div>${m.content}</div>`).join('');
  const typingDiv=document.createElement('div');typingDiv.className='msg msg-ai';
  typingDiv.innerHTML=`<div class="msg-label">Tutor</div><div class="typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(typingDiv);msgs.scrollTop=msgs.scrollHeight;
  const w=topics[currentTopic];
  const systemPrompt=`You are an expert AQA A Level Design & Technology tutor specialising in engineering calculations. Topic: "${w.title}". Focus: ${w.focus}.
Key concepts: ${w.topics.map(t=>t.title).join(', ')}.
Key formulae: ${w.formulas.map(f=>f.name+': '+f.expr).join(' | ')}.

Your approach to calculations:
1. ALWAYS start by writing the formula with all variables named
2. Identify and convert units BEFORE substituting (kN→N, mm→m, μF→F, kΩ→Ω as needed)
3. Substitute values with units shown in the working
4. Calculate step-by-step, showing intermediate results
5. State the final answer with correct units and a brief engineering interpretation
6. Point out if the result is realistic (e.g. stress within material limits, timing within expected range)
7. For unit conversions: explain the conversion explicitly — this is where most students lose marks
8. Common mistakes to flag: mixing N/mm² and N/m²; forgetting to square radius for circular areas; not converting kN to N; using diameter instead of radius; Detectability scale in FMEA is inverted (10=can't detect)
Use • bullet points for steps. Be precise with significant figures (3 s.f. typically appropriate).`;

  const messages=chatHistory[currentTopic].map(m=>({role:m.role==='ai'?'assistant':'user',content:m.content.replace(/<[^>]*>/g,'')}));
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:systemPrompt,messages})});
    const data=await res.json();
    const reply=data.content?.[0]?.text||'Sorry, could not get a response. Please try again.';
    const formatted=reply
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .replace(/`([^`]+)`/g,'<code style="font-family:\'DM Mono\',monospace;background:rgba(64,168,204,0.12);color:var(--teal2);padding:1px 5px;border-radius:2px;font-size:13px;">$1</code>')
      .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
    chatHistory[currentTopic].push({role:'ai',content:formatted});
    typingDiv.remove();
    msgs.innerHTML=chatHistory[currentTopic].map(m=>`<div class="msg msg-${m.role}"><div class="msg-label">${m.role==='user'?'You':'Tutor'}</div>${m.content}</div>`).join('');
  }catch(e){
    typingDiv.remove();
    const errDiv=document.createElement('div');errDiv.className='msg msg-ai';
    errDiv.innerHTML=`<div class="msg-label">Tutor</div>Network error — please check your connection and retry.`;
    msgs.appendChild(errDiv);
  }
  if(sendBtn)sendBtn.disabled=false;
  msgs.scrollTop=msgs.scrollHeight;
}

buildNav();
renderContent();
</script>
</body>
</html>
