<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AQA A Level Design &amp; Technology — Revision Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400;500&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#17150f;--parchment:#f5f2e8;--cream:#eae6d6;
  --gold:#c47c2a;--gold2:#e0a050;--teal:#2a6e8a;--teal2:#40a8cc;
  --green:#3a8a54;--green2:#58c476;--red:#8a2a2a;--red2:#c44040;
  --muted:#6b6050;--border:rgba(196,124,42,0.25);--border2:rgba(196,124,42,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--ink);color:var(--parchment);font-family:'Crimson Pro',Georgia,serif;font-size:17px;line-height:1.7;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 80px,rgba(196,124,42,0.018) 80px,rgba(196,124,42,0.018) 81px),repeating-linear-gradient(90deg,transparent,transparent 80px,rgba(196,124,42,0.012) 80px,rgba(196,124,42,0.012) 81px);pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 24px;}
header{border-bottom:1px solid var(--border);padding:2rem 0 1.5rem;}
.header-inner{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;}
.site-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:600;color:var(--gold2);letter-spacing:-0.01em;line-height:1.1;}
.site-sub{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;margin-top:4px;}
.header-badges{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.badge{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;padding:4px 10px;border-radius:3px;border:1px solid;}
.badge-a{border-color:var(--gold);color:var(--gold);}
.badge-b{border-color:var(--teal2);color:var(--teal2);}
.badge-c{border-color:rgba(192,80,80,0.5);color:#c05050;}
.main-layout{display:grid;grid-template-columns:260px 1fr;gap:0;min-height:calc(100vh - 120px);}
.sidebar{border-right:1px solid var(--border2);padding:1.5rem 0;position:sticky;top:0;height:calc(100vh - 90px);overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:3px;}.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.sidebar-section-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);padding:0 20px 8px;border-bottom:1px solid var(--border2);margin-bottom:4px;}
.nav-item{display:flex;align-items:flex-start;gap:10px;padding:10px 20px;cursor:pointer;border-left:2px solid transparent;transition:all 0.15s;}
.nav-item:hover{background:rgba(196,124,42,0.05);}
.nav-item.active{border-left-color:var(--gold);background:rgba(196,124,42,0.09);}
.nav-item.active .nav-title{color:var(--gold2);}
.nav-dot{width:6px;height:6px;border-radius:50%;margin-top:7px;flex-shrink:0;}
.dot-mat{background:var(--teal2);}.dot-elec{background:#9b8fd0;}.dot-man{background:var(--green2);}.dot-qual{background:var(--red2);}.dot-design{background:var(--gold2);}.dot-rev{background:#c05060;}
.nav-content{flex:1;min-width:0;}
.nav-week{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;}
.nav-title{font-size:13px;color:var(--parchment);line-height:1.3;margin-top:1px;}
.content{padding:2rem 2.5rem;overflow-y:auto;}
.week-header{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border2);}
.week-meta{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.week-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 9px;border-radius:2px;}
.tag-mat{background:rgba(64,168,204,0.15);color:var(--teal2);border:1px solid rgba(64,168,204,0.3);}
.tag-elec{background:rgba(155,143,208,0.15);color:#b5aadd;border:1px solid rgba(155,143,208,0.3);}
.tag-man{background:rgba(88,196,118,0.15);color:var(--green2);border:1px solid rgba(88,196,118,0.3);}
.tag-qual{background:rgba(196,64,64,0.15);color:#e07070;border:1px solid rgba(196,64,64,0.3);}
.tag-design{background:rgba(196,124,42,0.15);color:var(--gold2);border:1px solid var(--border);}
.tag-rev{background:rgba(192,80,96,0.15);color:#d07080;border:1px solid rgba(192,80,96,0.3);}
.week-number{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
.week-title-text{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:600;color:var(--parchment);line-height:1.2;margin-bottom:6px;}
.week-focus{color:var(--muted);font-style:italic;font-size:15px;}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border2);margin-bottom:1.5rem;overflow-x:auto;}
.tabs::-webkit-scrollbar{height:2px;}.tabs::-webkit-scrollbar-thumb{background:var(--border);}
.tab{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:8px 15px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;white-space:nowrap;flex-shrink:0;}
.tab:hover{color:var(--parchment);}.tab.active{color:var(--gold2);border-bottom-color:var(--gold);}
.topics-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem;}
@media(max-width:700px){.topics-grid{grid-template-columns:1fr;}}
.topic-card{border:1px solid var(--border2);border-radius:4px;padding:14px 16px;background:rgba(255,255,255,0.02);transition:border-color 0.15s,background 0.15s;}
.topic-card:hover{border-color:var(--border);background:rgba(196,124,42,0.04);}
.topic-card-title{font-size:14px;font-weight:400;color:var(--gold2);margin-bottom:6px;font-family:'Playfair Display',serif;}
.topic-card-body{font-size:14px;color:var(--muted);line-height:1.5;}
/* FORMULA CARDS */
.formula-section{margin-bottom:1.5rem;}
.section-heading{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border2);}
.formula-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}
.formula-card{background:rgba(40,110,138,0.08);border:1px solid rgba(64,168,204,0.22);border-radius:4px;padding:13px 15px;}
.formula-name{font-size:12px;color:var(--teal2);margin-bottom:5px;font-family:'DM Mono',monospace;letter-spacing:0.04em;font-weight:500;}
.formula-expr{font-family:'DM Mono',monospace;font-size:14px;color:var(--parchment);font-weight:500;letter-spacing:0.02em;line-height:1.6;}
.formula-note{font-size:12px;color:var(--muted);margin-top:5px;font-style:italic;}
.formula-units{font-size:11px;color:var(--teal2);margin-top:3px;font-family:'DM Mono',monospace;opacity:0.8;}
/* WORKED EXAMPLES */
.example-box{border:1px solid var(--border);border-radius:4px;background:rgba(196,124,42,0.04);margin-bottom:14px;overflow:hidden;}
.example-header{background:rgba(196,124,42,0.09);padding:10px 16px;display:flex;align-items:flex-start;justify-content:space-between;cursor:pointer;border-bottom:1px solid var(--border2);}
.example-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.08em;color:var(--gold);text-transform:uppercase;margin-bottom:3px;}
.example-q{font-size:14px;color:var(--parchment);line-height:1.5;}
.toggle-icon{color:var(--gold);font-size:14px;flex-shrink:0;margin-left:10px;margin-top:2px;}
.example-body{padding:16px;display:none;}.example-body.open{display:block;}
.step{display:flex;gap:12px;margin-bottom:12px;}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--teal);color:#fff;font-family:'DM Mono',monospace;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.step-content{flex:1;font-size:14px;color:var(--cream);line-height:1.65;}
.step-content code{font-family:'DM Mono',monospace;background:rgba(64,168,204,0.12);color:var(--teal2);padding:1px 6px;border-radius:2px;font-size:13px;}
.answer-box{background:rgba(58,138,84,0.1);border:1px solid rgba(88,196,118,0.28);border-radius:3px;padding:10px 14px;margin-top:10px;font-family:'DM Mono',monospace;font-size:13px;color:var(--green2);}
.warning-box{background:rgba(138,42,42,0.1);border:1px solid rgba(196,64,64,0.28);border-radius:3px;padding:10px 14px;margin-top:8px;font-size:13px;color:#e07070;font-style:italic;}
/* UNIT TABLE */
.unit-table{width:100%;border-collapse:collapse;font-size:13px;margin:12px 0;}
.unit-table th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);padding:7px 10px;border-bottom:1px solid var(--border);text-align:left;background:rgba(196,124,42,0.06);}
.unit-table td{padding:7px 10px;border-bottom:1px solid var(--border2);color:var(--cream);line-height:1.4;vertical-align:top;}
.unit-table tr:last-child td{border-bottom:none;}
.unit-table td:first-child{color:var(--gold2);font-family:'DM Mono',monospace;font-size:12px;}
.unit-table td:nth-child(2){color:var(--teal2);font-family:'DM Mono',monospace;font-size:12px;}
/* DIAGRAMS */
.diagram-guide{border:1px solid var(--border2);border-radius:4px;padding:16px;margin-bottom:14px;background:rgba(255,255,255,0.015);}
.diagram-title{font-family:'Playfair Display',serif;font-size:15px;color:var(--gold2);margin-bottom:8px;}
.diagram-steps{list-style:none;counter-reset:step-count;}
.diagram-steps li{font-size:13px;color:var(--cream);padding:4px 0 4px 22px;position:relative;line-height:1.5;}
.diagram-steps li::before{content:counter(step-count);counter-increment:step-count;position:absolute;left:0;font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);top:6px;}
/* ANALYSIS */
.analysis-card{border:1px solid var(--border2);border-radius:4px;padding:18px;margin-bottom:14px;background:rgba(255,255,255,0.015);}
.analysis-heading{font-family:'Playfair Display',serif;font-size:15px;color:var(--gold2);margin-bottom:12px;}
.analysis-chain{font-family:'DM Mono',monospace;font-size:12px;color:var(--teal2);background:rgba(40,110,138,0.1);border:1px solid rgba(64,168,204,0.25);border-radius:3px;padding:10px 14px;margin-bottom:12px;line-height:2;letter-spacing:0.02em;}
.eval-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
.eval-list{margin-bottom:12px;}
.eval-item{font-size:13px;color:var(--cream);padding:6px 0 6px 18px;position:relative;line-height:1.5;border-bottom:1px solid var(--border2);}
.eval-item:last-child{border-bottom:none;}
.eval-item::before{content:'→';position:absolute;left:0;color:var(--gold);font-family:'DM Mono',monospace;font-size:11px;top:7px;}
.mistake-box{background:rgba(138,42,42,0.08);border:1px solid rgba(196,64,64,0.22);border-radius:3px;padding:9px 12px;}
.mistake-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:#c05050;margin-bottom:3px;}
.mistake-text{font-size:12px;color:#d07070;font-style:italic;line-height:1.5;}
/* QUIZ */
.quiz-card{border:1px solid var(--border2);border-radius:4px;padding:18px;background:rgba(255,255,255,0.015);margin-bottom:12px;}
.quiz-q{font-size:15px;color:var(--parchment);margin-bottom:12px;line-height:1.5;}
.quiz-options{display:flex;flex-direction:column;gap:7px;}
.quiz-opt{padding:9px 14px;border-radius:3px;border:1px solid var(--border2);background:transparent;color:var(--cream);font-size:13px;cursor:pointer;text-align:left;transition:all 0.12s;font-family:'Crimson Pro',serif;line-height:1.4;}
.quiz-opt:hover:not(:disabled){border-color:var(--gold);background:rgba(196,124,42,0.05);}
.quiz-opt.correct{background:rgba(58,138,84,0.2);border-color:var(--green2);color:var(--green2);}
.quiz-opt.wrong{background:rgba(138,42,42,0.15);border-color:#c05060;color:#d07080;}
.quiz-explanation{font-size:13px;color:var(--muted);margin-top:10px;font-style:italic;line-height:1.5;display:none;}
.quiz-explanation.show{display:block;}
.quiz-score{font-family:'DM Mono',monospace;font-size:12px;color:var(--gold);margin-bottom:12px;letter-spacing:0.06em;}
/* MCQ */
.mcq-filter-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:1.2rem;}
.mcq-filter-btn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.07em;text-transform:uppercase;padding:5px 11px;border-radius:3px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.mcq-filter-btn:hover{border-color:var(--gold);color:var(--gold2);}
.mcq-filter-btn.active{border-color:var(--gold);background:rgba(196,124,42,0.1);color:var(--gold2);}
.q-topic-tag{display:inline-block;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.08em;text-transform:uppercase;padding:2px 7px;border-radius:2px;background:rgba(196,124,42,0.1);border:1px solid var(--border2);color:var(--muted);margin-bottom:8px;}
.mcq-results{border:1px solid var(--border);border-radius:4px;padding:18px;margin-bottom:1.2rem;background:rgba(196,124,42,0.04);}
.mcq-results-score{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--gold2);margin-bottom:6px;}
.mcq-results-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:0.06em;margin-bottom:14px;}
.mcq-breakdown{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-top:10px;}
.mcq-breakdown-item{background:rgba(255,255,255,0.02);border:1px solid var(--border2);border-radius:3px;padding:8px 12px;}
.mcq-breakdown-topic{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:3px;}
.mcq-breakdown-score{font-size:14px;color:var(--parchment);}
.mcq-breakdown-score span{color:var(--teal2);font-family:'DM Mono',monospace;font-size:13px;}
/* TUTOR */
.tutor-section{border-top:1px solid var(--border2);padding-top:1.5rem;margin-top:1.5rem;}
.tutor-heading{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold2);margin-bottom:12px;}
.quick-prompts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.quick-btn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;padding:6px 12px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.quick-btn:hover{border-color:var(--gold);color:var(--gold2);background:rgba(196,124,42,0.06);}
.chat-area{border:1px solid var(--border2);border-radius:4px;overflow:hidden;background:rgba(0,0,0,0.2);}
.chat-messages{min-height:200px;max-height:420px;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.chat-messages::-webkit-scrollbar{width:3px;}.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.msg{max-width:85%;font-size:14px;line-height:1.6;}
.msg-user{align-self:flex-end;background:rgba(64,168,204,0.15);border:1px solid rgba(64,168,204,0.25);border-radius:3px 3px 0 3px;padding:8px 12px;color:var(--cream);}
.msg-ai{align-self:flex-start;background:rgba(196,124,42,0.07);border:1px solid var(--border2);border-radius:3px 3px 3px 0;padding:10px 14px;color:var(--parchment);}
.msg-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;color:var(--muted);}
.typing{display:flex;gap:4px;align-items:center;padding:4px 0;}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:blink 1.2s infinite;}
.typing span:nth-child(2){animation-delay:0.2s;}.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,80%,100%{opacity:0.2}40%{opacity:1}}
.chat-input-row{display:flex;border-top:1px solid var(--border2);background:rgba(255,255,255,0.02);}
.chat-input{flex:1;background:transparent;border:none;outline:none;padding:12px 16px;font-family:'Crimson Pro',serif;font-size:15px;color:var(--parchment);resize:none;}
.chat-input::placeholder{color:var(--muted);}
.send-btn{padding:12px 16px;background:transparent;border:none;border-left:1px solid var(--border2);cursor:pointer;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;transition:all 0.15s;}
.send-btn:hover{color:var(--gold2);background:rgba(196,124,42,0.06);}.send-btn:disabled{opacity:0.4;cursor:not-allowed;}
.progress-bar{height:2px;background:var(--border2);border-radius:1px;margin:1rem 0;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal2),var(--gold));border-radius:1px;transition:width 0.4s;}
.mt{margin-top:1rem;}.muted{color:var(--muted);}
@media(max-width:768px){
  .main-layout{grid-template-columns:1fr;}
  .sidebar{height:auto;position:static;border-right:none;border-bottom:1px solid var(--border2);padding:1rem 0;}
  .content{padding:1.5rem 1rem;}
  .topics-grid{grid-template-columns:1fr;}
  .site-title{font-size:1.4rem;}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
.content{animation:fadeUp 0.3s ease;}
</style>
</head>

<header>
  <div class="wrap">
    <div class="header-inner">
      <div>
        <div class="site-title">DT Engineering Tutor</div>
        <div class="site-sub">AQA A Level Design &amp; Technology · Engineering Calculations · May 2026</div>

        <span class="badge badge-a">Materials</span>

      </div>

</header>

</div>

<script>
const TABS = ['overview','formulas','examples','diagrams','analysis','quiz','tutor'];

const topics = [
{
  id:0, label:"Topic 1", dotClass:"dot-mat", tagClass:"tag-mat", typeLabel:"Materials Science",
  title:"Materials, Stress & Structural Calculations",
  focus:"Stress, strain, Young's Modulus, Factor of Safety, density and material selection calculations",
  topics:[
    {title:"Stress & Strain",body:"Stress (σ): force per unit area. Tensile stress stretches the material; compressive stress squashes it. Strain (ε): fractional change in length — dimensionless. The stress-strain curve shows elastic behaviour (linear, recoverable) up to the elastic limit, then plastic deformation, then fracture at the Ultimate Tensile Strength (UTS)."},
    {title:"Young's Modulus",body:"Young's Modulus (E) measures stiffness — how much stress is needed to produce a given strain. Steep gradient on a stress-strain graph = high E = stiff material. E is a material property (constant for a given material at a given temperature) independent of cross-section or length. Steel ≈ 200 GPa; Aluminium ≈ 70 GPa; CFRP ≈ 70–150 GPa; Rubber ≈ 0.01 GPa."},
    {title:"Factor of Safety",body:"The Factor of Safety (FoS) ensures a component does not operate near its failure limit. FoS = Ultimate Strength ÷ Working (design) Stress. FoS > 1 always required. Typical values: bridges and structures 4–6 (unpredictable loading), aircraft 1.5–2.5 (weight-critical, well-understood loads), consumer products 2–4. A higher FoS means heavier, more expensive components."},
    {title:"Density & Specific Strength",body:"Density (ρ) = mass/volume. Different materials have vastly different densities: steel 7,850 kg/m³, aluminium 2,700 kg/m³, CFRP ≈ 1,600 kg/m³, oak timber ≈ 750 kg/m³. Specific strength = tensile strength ÷ density — a measure of how strong a material is for its weight. CFRP has exceptional specific strength, making it ideal for aerospace and sport where weight is critical."}
  ],
  formulas:[
    {name:"Stress",expr:"σ = F / A",note:"Stress = Force ÷ Cross-sectional Area",units:"σ in Pa (N/m²) or MPa (N/mm²). F in N. A in m² or mm²"},
    {name:"Strain",expr:"ε = ΔL / L₀",note:"Strain = Extension ÷ Original Length. Dimensionless — no units.",units:"ΔL and L₀ must be in same units. ε typically 0.001–0.01 for metals"},
    {name:"Young's Modulus",expr:"E = σ / ε",note:"Stiffness. Only valid in the elastic region (straight part of stress-strain curve).",units:"E in Pa or GPa. Steel ≈ 200 GPa = 200 × 10⁹ Pa"},
    {name:"Factor of Safety",expr:"FoS = UTS / σ_working",note:"UTS = Ultimate Tensile Strength. σ_working = actual stress under design load.",units:"FoS is dimensionless. Both stresses must be in same units"},
    {name:"Density",expr:"ρ = m / V",note:"Mass per unit volume. Used to calculate weight of a component.",units:"ρ in kg/m³ or g/cm³. m in kg, V in m³"},
    {name:"Component mass",expr:"m = ρ × V",note:"Volume must match density units. Cylinder: V = π r² L. Cuboid: V = L × W × H",units:"If ρ in kg/m³ and V in m³, m in kg"},
    {name:"Specific Strength",expr:"Specific strength = UTS / ρ",note:"Strength per unit mass. Higher = better for lightweight applications.",units:"Units: N/m² ÷ kg/m³ = Nm/kg. Compare: CFRP > Ti > Al > Steel"},
    {name:"Cross-section area (circle)",expr:"A = π r² = π d² / 4",note:"For circular rods and wires. Always convert diameter to radius first.",units:"If d in mm, A in mm². If d in m, A in m²"}
  ],
  examples:[
    {q:"A steel bolt has diameter 12 mm and carries a tensile load of 11.3 kN. Calculate the tensile stress in MPa.",steps:[
      {text:"Convert diameter to radius: <code>r = 12/2 = 6 mm = 0.006 m</code>"},
      {text:"Cross-sectional area: <code>A = π × (0.006)² = π × 3.6×10⁻⁵ = 1.131×10⁻⁴ m²</code>"},
      {text:"Convert force: <code>F = 11.3 kN = 11,300 N</code>"},
      {text:"Stress: <code>σ = F/A = 11,300 / 1.131×10⁻⁴ = 99.9×10⁶ Pa ≈ 100 MPa</code>"}
    ],answer:"σ ≈ 100 MPa. Check: Steel UTS ≈ 400–800 MPa, so this stress is well within limits."},
    {q:"A steel wire (E = 200 GPa) of original length 2.5 m extends by 1.25 mm under load. Calculate the strain and the stress.",steps:[
      {text:"Strain: <code>ε = ΔL/L₀ = 0.00125 / 2.5 = 0.0005</code> (dimensionless)"},
      {text:"Stress: <code>σ = E × ε = 200×10⁹ × 0.0005 = 1×10⁸ Pa = 100 MPa</code>"},
      {text:"Check: strain of 0.0005 = 0.05% — well within elastic range for steel (elastic limit typically ε ≈ 0.001–0.002)"}
    ],answer:"ε = 0.0005; σ = 100 MPa. The wire is operating in the elastic region and will return to original length when unloaded."},
    {q:"A structural bracket made from aluminium alloy (UTS = 310 MPa) must carry a maximum load of 15 kN. A Factor of Safety of 3 is required. Calculate the minimum cross-sectional area.",steps:[
      {text:"Maximum allowable working stress: <code>σ_working = UTS / FoS = 310 / 3 = 103.3 MPa</code>"},
      {text:"Required area: <code>A = F / σ_working = 15,000 / (103.3 × 10⁶) = 1.452×10⁻⁴ m²</code>"},
      {text:"Convert to mm²: <code>1.452×10⁻⁴ × 10⁶ = 145.2 mm²</code>"},
      {text:"This is the minimum area — in practice round up to a standard section size."}
    ],answer:"Minimum area = 145.2 mm² (e.g. a 13mm × 11mm rectangular section would suffice at 143mm² — choose slightly larger standard section)."},
    {q:"Compare the specific strength of steel (UTS 500 MPa, ρ = 7,850 kg/m³) and CFRP (UTS 1,500 MPa, ρ = 1,600 kg/m³). Which is better for a lightweight structural application?",steps:[
      {text:"Steel specific strength: <code>500×10⁶ / 7,850 = 63,694 Nm/kg ≈ 63.7 kNm/kg</code>"},
      {text:"CFRP specific strength: <code>1,500×10⁶ / 1,600 = 937,500 Nm/kg ≈ 937.5 kNm/kg</code>"},
      {text:"Ratio: <code>937.5 / 63.7 = 14.7×</code> — CFRP is nearly 15 times stronger per unit mass than steel."},
      {text:"For weight-critical applications (aerospace, racing cars, bicycles) CFRP is far superior despite costing ~50× more per kg than steel."}
    ],answer:"CFRP specific strength ≈ 938 kNm/kg vs steel ≈ 64 kNm/kg. CFRP is ~15× better for lightweight structures. Cost is the primary barrier to wider adoption."},
    {q:"A cylindrical aluminium rod (diameter 20 mm, length 500 mm, ρ = 2,700 kg/m³) is to be replaced with CFRP (ρ = 1,600 kg/m³) of the same dimensions. Calculate the mass of each and the weight saving.",steps:[
      {text:"Volume: <code>V = π × (0.01)² × 0.5 = π × 10⁻⁴ × 0.5 = 1.571×10⁻⁴ m³</code>"},
      {text:"Aluminium mass: <code>m = ρV = 2,700 × 1.571×10⁻⁴ = 0.424 kg</code>"},
      {text:"CFRP mass: <code>m = 1,600 × 1.571×10⁻⁴ = 0.251 kg</code>"},
      {text:"Weight saving: <code>0.424 − 0.251 = 0.173 kg (40.8%)</code>"}
    ],answer:"Al: 424g; CFRP: 251g. Saving = 173g (41%). At aircraft scale, thousands of such components make a significant difference to fuel consumption."}
  ],
  diagrams:[
    {title:"Stress-Strain Curve — Annotated",steps:[
      "Draw axes: vertical = Stress σ (MPa), horizontal = Strain ε (dimensionless, or ×10⁻³)",
      "Elastic region: draw a straight line from origin — gradient = Young's Modulus E = σ/ε",
      "Mark Proportional Limit (P): last point where stress is strictly proportional to strain",
      "Mark Elastic Limit: last point of fully recoverable deformation (very close to P for metals)",
      "Mark Yield Point (Y): steel shows upper and lower yield points — a sudden drop. Other metals show gradual transition",
      "Plastic region: curve flattens — strain continues without proportional stress increase",
      "Mark UTS: highest point on the curve — Ultimate Tensile Strength",
      "Mark Fracture point: curve drops (necking) then material breaks. Ductile materials: significant drop. Brittle: UTS ≈ fracture",
      "Shade the area under the elastic region = elastic strain energy stored (J/m³)"
    ]},
    {title:"Unit Conversion for Stress Calculations",steps:[
      "Force: 1 kN = 1,000 N. Always convert kN → N before substituting into σ = F/A",
      "Area: 1 mm² = 1×10⁻⁶ m². 1 cm² = 1×10⁻⁴ m². If using mm² for area, answer will be in N/mm² = MPa",
      "Shortcut: if F in N and A in mm², σ = F/A gives answer directly in N/mm² = MPa",
      "Prefixes: 1 MPa = 10⁶ Pa = 1 N/mm². 1 GPa = 10⁹ Pa = 1,000 MPa",
      "Length: 1 mm = 10⁻³ m. For strain ΔL/L₀, units cancel — both must be same unit",
      "Density: 1 g/cm³ = 1,000 kg/m³. Steel: 7.85 g/cm³ = 7,850 kg/m³"
    ]}
  ],
  analysis:[
    {heading:"Factor of Safety — Selecting the Right Value",chain:"Identify the application → assess consequences of failure (catastrophic vs inconvenient) → assess load predictability (known static load vs variable/dynamic/impact) → assess material variability (certified aerospace alloy vs recycled timber) → assess inspection regime (regular NDT vs inaccessible) → higher uncertainty in any factor → higher FoS required → typical values: aircraft 1.5–2.5 (low FoS justified by rigorous testing, weight-critical), bridges 4–6 (public safety, dynamic loading, long service life without inspection)",evals:["A high FoS does not automatically mean a safe design — if the wrong material is chosen or the stress concentration at a fillet radius is ignored, any FoS can be insufficient","Weight-critical applications accept lower FoS because every kg of structure reduces payload — Formula 1 cars operate near material limits with FoS approaching 1 in some components, managed through frequent inspection and replacement","Manufacturing tolerances affect effective FoS — a ±10% tolerance on cross-sectional area means a designed FoS of 2 could be as low as 1.8 in practice"],mistake:"FoS applies to the failure stress (UTS or yield), not to the working load. Students often write FoS = maximum load / working load — this is wrong. FoS = strength of material / stress caused by working load."},
    {heading:"Material Selection — Using Calculated Properties",chain:"Design load and geometry defined → calculate required stress from FoS → compare with candidate materials' UTS → check density → calculate mass → calculate cost → check other constraints (corrosion resistance, machinability, recyclability, availability) → use weighted matrix if multiple criteria conflict → select material that meets all critical requirements at lowest cost",evals:["Calculated specific strength may favour CFRP, but if the component must be machined (drilled, tapped) then CFRP's poor machinability and health hazards from carbon dust are decisive practical constraints","The cheapest material that meets the specification is usually correct — over-engineering (excessive strength, excessive FoS) wastes material, increases weight and adds cost without adding function","Environmental impact is increasingly a selection criterion — embodied energy of aluminium is much higher than steel (primary aluminium uses ~13× more energy per kg) but aluminium is fully recyclable with only 5% of original energy — lifecycle matters"],mistake:"Never select a material based only on one property. A material with the highest tensile strength may be too brittle (low toughness), too heavy, too expensive, or too difficult to join. Material selection is always multi-criteria."}
  ],
  quiz:[
    {q:"A rod of cross-section 80 mm² carries a tensile force of 24 kN. The tensile stress is:",opts:["300 MPa","3 MPa","30 MPa","0.3 MPa"],correct:0,exp:"σ = F/A = 24,000 N / 80 mm² = 300 N/mm² = 300 MPa. Shortcut: F in N, A in mm² → answer in N/mm² = MPa directly. 24,000/80 = 300 MPa."},
    {q:"Young's Modulus E = 70 GPa. A strain of 0.002 is produced. The stress is:",opts:["35 MPa","140 MPa","0.14 GPa","140 GPa"],correct:1,exp:"σ = E × ε = 70×10⁹ × 0.002 = 1.4×10⁸ Pa = 140 MPa. Note: 0.14 GPa = 140 MPa — same value, different prefix. The answer 140 MPa is the clearest form for engineering stress."},
    {q:"A component has UTS = 400 MPa and must operate with a working stress of 80 MPa. The Factor of Safety is:",opts:["320","0.2","5","80"],correct:2,exp:"FoS = UTS / working stress = 400 / 80 = 5. This means the component could withstand 5× the working load before failure — appropriate for a safety-critical structure with variable loading. FoS < 1 would mean the component is already overstressed."},
    {q:"CFRP (UTS 1,200 MPa, ρ = 1,600 kg/m³) vs titanium (UTS 900 MPa, ρ = 4,500 kg/m³). Which has higher specific strength?",opts:["Titanium — higher absolute UTS per unit area","CFRP — 750 kNm/kg vs titanium 200 kNm/kg","They are equal in specific strength","Titanium — higher density means more material per volume"],correct:1,exp:"CFRP: 1,200×10⁶/1,600 = 750,000 Nm/kg = 750 kNm/kg. Titanium: 900×10⁶/4,500 = 200,000 Nm/kg = 200 kNm/kg. CFRP is 3.75× better in specific strength — hence its use in aerospace and high-performance sports equipment despite costing far more than titanium."}
  ],
  quickPrompts:["Walk me through a Factor of Safety calculation from scratch","How do I convert between Pa, MPa and GPa without making errors?","Explain the stress-strain curve and what each region means"]

{
  id:1, label:"Topic 2", dotClass:"dot-elec", tagClass:"tag-elec", typeLabel:"Electronics",
  title:"Electronic Circuit Calculations",
  focus:"Ohm's Law, power, potential dividers, resistor networks, RC timing and op-amp gain",
  topics:[
    {title:"Ohm's Law & Power",body:"Ohm's Law (V = IR) links voltage, current and resistance. Power dissipated in a resistor can be expressed three ways depending on which two quantities are known: P = IV, P = I²R, P = V²/R. Always check units: voltage in V, current in A, resistance in Ω, power in W. Energy (J) = Power (W) × Time (s)."},
    {title:"Series & Parallel Resistors",body:"Series: same current flows through all; voltages add; R_total = R1+R2+... Parallel: same voltage across all; currents add; 1/R_total = 1/R1+1/R2+... Two equal resistors in parallel: R_total = R/2. The voltage divider (potential divider) is a series circuit used to produce a fraction of the supply voltage."},
    {title:"Potential Divider & Sensors",body:"Potential divider: Vout = Vin × R2/(R1+R2) where R2 is the lower resistor (connected to 0V). Used with variable-resistance sensors: LDR (resistance falls in bright light), NTC thermistor (resistance falls as temperature rises), strain gauge (resistance changes with deformation). Swapping the positions of sensor and fixed resistor inverts the Vout response."},
    {title:"RC Timing, Op-Amps & Digital",body:"RC circuit time constant: τ = RC (seconds). Capacitor reaches 63% of final charge after 1τ, 99% after 5τ. Used in timing, filtering and debouncing circuits. Op-amp inverting gain: Vout = −(Rf/Rin) × Vin. Non-inverting gain: Vout = (1 + Rf/Rin) × Vin. PWM duty cycle determines average output voltage: Vavg = Vsupply × duty cycle."}
  ],
  formulas:[
    {name:"Ohm's Law",expr:"V = I × R",note:"Voltage = Current × Resistance. Rearrange for I = V/R or R = V/I.",units:"V in volts (V), I in amperes (A), R in ohms (Ω)"},
    {name:"Power — three forms",expr:"P = IV = I²R = V²/R",note:"Use whichever two quantities are known. Choose the form that avoids intermediate calculation.",units:"P in watts (W). 1 W = 1 J/s"},
    {name:"Series resistors",expr:"R_T = R₁ + R₂ + R₃ + ...",note:"Total resistance increases. Current same through all. Voltages add to Vsupply.",units:"All R values in same unit (Ω, kΩ, MΩ)"},
    {name:"Parallel resistors",expr:"1/R_T = 1/R₁ + 1/R₂ + ...",note:"Total R less than smallest branch. For two: R_T = (R₁×R₂)/(R₁+R₂).",units:"Answer in same units as input. Convert to conductance G=1/R to add, then invert."},
    {name:"Potential divider",expr:"Vout = Vin × R₂ / (R₁ + R₂)",note:"R₂ is the lower resistor (to 0V). R₁ is the upper resistor (to Vsupply).",units:"If Vin in V, Vout in V. R₁, R₂ can be in Ω or kΩ — ratio is what matters"},
    {name:"RC time constant",expr:"τ = R × C",note:"After time τ: capacitor at 63% of final voltage. Fully charged (99%) after 5τ.",units:"τ in seconds. R in Ω, C in farads (F). 1 μF = 10⁻⁶ F"},
    {name:"Capacitor charge at time t",expr:"V(t) = Vfinal × (1 − e^(−t/τ))",note:"At t=τ: V = 0.632Vfinal. Used to find voltage at any point during charging.",units:"t in seconds, τ in seconds, V in volts"},
    {name:"Op-amp inverting gain",expr:"Gain = −Rf / Rin",note:"Negative sign = output is inverted (180° phase shift). Magnitude = Rf/Rin.",units:"Gain is dimensionless. Rf and Rin in same units (both Ω or both kΩ)"},
    {name:"PWM average voltage",expr:"Vavg = Vsupply × (duty cycle / 100)",note:"Duty cycle in %. 60% duty on 5V supply → 3V average.",units:"Vavg and Vsupply in V. Duty cycle as percentage (0–100%)"},
    {name:"Voltage across R in series",expr:"VR = Vsupply × R / R_total",note:"Voltage divides in proportion to resistance in series circuits.",units:"Same units throughout"}
  ],
  examples:[
    {q:"A 470 Ω resistor is connected to a 9V supply. Calculate the current through it and the power it dissipates.",steps:[
      {text:"Current: <code>I = V/R = 9/470 = 0.01915 A = 19.1 mA</code>"},
      {text:"Power (use P=V²/R since V and R are known): <code>P = 9²/470 = 81/470 = 0.172 W = 172 mW</code>"},
      {text:"Check with P=IV: <code>P = 0.01915 × 9 = 0.172 W ✓</code>"},
      {text:"A standard ¼W (250 mW) resistor is adequate — 172 mW < 250 mW."}
    ],answer:"I = 19.1 mA; P = 172 mW. A ¼W resistor is sufficient. Always verify the resistor power rating exceeds dissipated power."},
    {q:"A potential divider has R1 = 10 kΩ (top) and an NTC thermistor as R2 (bottom). At 20°C, the thermistor = 8 kΩ. At 60°C, the thermistor = 2 kΩ. Vin = 5V. Calculate Vout at each temperature and describe the trend.",steps:[
      {text:"At 20°C: <code>Vout = 5 × 8000/(10000+8000) = 5 × 8/18 = 5 × 0.444 = 2.22 V</code>"},
      {text:"At 60°C: <code>Vout = 5 × 2000/(10000+2000) = 5 × 2/12 = 5 × 0.167 = 0.83 V</code>"},
      {text:"Trend: as temperature rises → thermistor resistance falls → smaller fraction of total resistance → Vout falls."},
      {text:"To invert this (Vout increases with temperature): swap R1 and thermistor positions."}
    ],answer:"At 20°C: Vout = 2.22V. At 60°C: Vout = 0.83V. Vout decreases as temperature increases with NTC thermistor in lower position."},
    {q:"Two resistors: R1 = 6 kΩ and R2 = 12 kΩ are connected in parallel. A third resistor R3 = 4 kΩ is in series with this parallel combination. The supply is 12V. Calculate total resistance, total current and voltage across the parallel section.",steps:[
      {text:"Parallel combination: <code>R_parallel = (6×12)/(6+12) = 72/18 = 4 kΩ</code>"},
      {text:"Total resistance: <code>R_total = R3 + R_parallel = 4 + 4 = 8 kΩ</code>"},
      {text:"Total current: <code>I = V/R = 12/8000 = 1.5×10⁻³ A = 1.5 mA</code>"},
      {text:"Voltage across parallel section: <code>V_parallel = I × R_parallel = 1.5×10⁻³ × 4000 = 6V</code>"},
      {text:"Check: voltage across R3 = 1.5×10⁻³ × 4000 = 6V. Total = 6+6 = 12V ✓"}
    ],answer:"R_total = 8kΩ; I_total = 1.5mA; V_parallel = 6V. Always check voltages sum to supply."},
    {q:"An RC timing circuit has R = 47 kΩ and C = 100 μF. Calculate the time constant τ and the time for the capacitor to reach 99% of the supply voltage (5V). What voltage does it reach after 10 seconds?",steps:[
      {text:"Time constant: <code>τ = RC = 47,000 × 100×10⁻⁶ = 47,000 × 10⁻⁴ = 4.7 s</code>"},
      {text:"Time to 99% (= 5τ): <code>t = 5 × 4.7 = 23.5 s</code>"},
      {text:"Voltage after 10s: <code>V(10) = 5 × (1 − e^(−10/4.7)) = 5 × (1 − e^(−2.128))</code>"},
      {text:"<code>e^(−2.128) = 0.119</code>, so <code>V(10) = 5 × (1 − 0.119) = 5 × 0.881 = 4.41 V</code>"}
    ],answer:"τ = 4.7s; fully charged after ≈23.5s; voltage after 10s = 4.41V (88% of Vfinal)."},
    {q:"An inverting op-amp has Rin = 10 kΩ and Rf = 47 kΩ. Input voltage = 0.5V. Calculate the output voltage and explain the significance of the negative sign.",steps:[
      {text:"Inverting gain: <code>Gain = −Rf/Rin = −47,000/10,000 = −4.7</code>"},
      {text:"Output voltage: <code>Vout = Gain × Vin = −4.7 × 0.5 = −2.35 V</code>"},
      {text:"Significance of negative sign: the output is 180° out of phase with the input — when input goes positive, output goes negative and vice versa."},
      {text:"Check: is this within supply rails? If op-amp powered from ±5V, output of −2.35V is within range ✓. If powered from 0–5V, the output would clip at 0V."}
    ],answer:"Vout = −2.35V. The output is inverted (antiphase) relative to the input. Always check the output is within the supply voltage limits."}
  ],
  diagrams:[
    {title:"Potential Divider with Sensor — Design Approach",steps:[
      "Draw supply rails: +Vin at top, 0V (GND) at bottom",
      "Place upper resistor R1 between +Vin and the midpoint node",
      "Place sensor (LDR, thermistor, etc.) as R2 between midpoint and GND",
      "Label midpoint as Vout — connect to ADC pin of microcontroller",
      "Write formula: Vout = Vin × R2/(R1+R2)",
      "Analyse: if R2 (sensor) falls → Vout falls (smaller fraction). If R2 rises → Vout rises",
      "To INVERT: swap R1 and R2 positions. Then Vout rises when sensor resistance falls",
      "Choosing R1: for maximum sensitivity, set R1 ≈ mid-range value of sensor. This maximises ΔVout per ΔR_sensor"
    ]},
    {title:"RC Charging Curve — How to Sketch",steps:[
      "Draw axes: vertical = voltage across capacitor (V); horizontal = time (s)",
      "Mark Vfinal (= supply voltage) as a horizontal dashed asymptote at the top",
      "Curve starts at 0V (uncharged capacitor) and rises steeply, then levels off approaching Vfinal",
      "Mark τ on time axis: voltage at this point = 0.632 × Vfinal",
      "Mark 2τ: voltage = 0.865 × Vfinal; 3τ: 0.950; 5τ: 0.993 (fully charged)",
      "The curve is exponential — it never mathematically reaches Vfinal but is considered 'fully charged' after 5τ",
      "Annotate: 'Rate of charging slows as voltage difference between supply and capacitor decreases'"
    ]}
  ],
  analysis:[
    {heading:"Choosing R1 in a Sensor Potential Divider",chain:"Sensor resistance varies over a range (e.g. LDR: 100Ω bright to 100kΩ dark) → choose R1 at geometric mean of sensor range: R1 = √(Rmin × Rmax) = √(100 × 100,000) = √(10⁷) = 3,162 Ω → use nearest standard value (3.3kΩ or 2.7kΩ) → this maximises the range of Vout across the full sensor range → microcontroller ADC uses full 0–5V input range effectively",evals:["If R1 >> Rmax: Vout barely changes across sensor range — poor sensitivity. If R1 << Rmin: similar problem in the other direction","The potential divider output has a non-linear relationship between sensor resistance and Vout — for precision measurement, calibration or linearisation is needed","Input impedance of the ADC (or buffer amplifier) loads the divider — if ADC input impedance is comparable to R1, the actual Vout will be lower than calculated (current drawn by ADC reduces Vout)"],mistake:"Don't just pick an arbitrary fixed resistor value. Explain that R1 is chosen to be in the mid-range of the sensor's expected resistance so that Vout changes significantly across the full measurement range."},
    {heading:"Power Dissipation — Component Rating",chain:"Calculate power in each component → compare to component's maximum rated power → if P_calculated > P_rated: component will overheat → failure or fire risk → select higher-rated component or reduce current by redesigning circuit → general rule: operate resistors at no more than 50% of rated power in continuous use (derating) → a ¼W resistor should not dissipate more than ~125mW in practice",evals:["Total power drawn from supply = sum of all individual component powers. This determines battery life or PSU capacity required","LEDs have maximum forward current ratings (typically 20mA for standard LEDs) — always check I through LED stays below this, not just power","Integrated circuits have package thermal limits — a MOSFET driver must be heatsinked if its power dissipation exceeds the package limit (typically 0.5–1W for TO-92; 40W for TO-220 with heatsink)"],mistake:"Students often forget to check that the chosen resistor power rating exceeds the calculated dissipation. A 100Ω resistor dissipating 0.5W in a 5V circuit needs to be a ½W or 1W component, not a standard ¼W one."}
  ],
  quiz:[
    {q:"A 2.2 kΩ resistor is connected across a 12V supply. The current is:",opts:["26.4 mA","5.45 mA","5.45 A","0.545 mA"],correct:1,exp:"I = V/R = 12 / 2,200 = 0.00545 A = 5.45 mA. Convert kΩ to Ω first (×1000). Power = 12 × 0.00545 = 65.4 mW — a ⅛W resistor would be adequate."},
    {q:"Potential divider: Vin = 9V, R1 = 15kΩ (top), R2 = 5kΩ (bottom). Vout across R2 is:",opts:["6.75V","2.25V","1V","4.5V"],correct:1,exp:"Vout = Vin × R2/(R1+R2) = 9 × 5/(15+5) = 9 × 5/20 = 9 × 0.25 = 2.25V. R2 is the LOWER resistor. The ratio 5:20 = 1:4 means Vout = ¼ of Vin. Cross-check: V across R1 = 9 × 15/20 = 6.75V. Total = 2.25+6.75 = 9V ✓"},
    {q:"An RC circuit has R = 100 kΩ and C = 10 μF. The time constant τ is:",opts:["10 ms","100 ms","1 s","10 s"],correct:2,exp:"τ = RC = 100,000 × 10×10⁻⁶ = 100,000 × 10⁻⁵ = 1 s. The circuit is essentially fully charged after 5τ = 5 seconds. Useful for timing applications in the 1–10 second range."},
    {q:"An inverting op-amp has Rin = 5kΩ and Rf = 20kΩ. Input = +0.3V. Output is:",opts:["+1.2V","−1.2V","+4V","−0.075V"],correct:1,exp:"Gain = −Rf/Rin = −20/5 = −4. Vout = −4 × 0.3 = −1.2V. The output is inverted (negative) and amplified by factor 4. If using a single-rail supply (0–5V), a −1.2V output would clip to 0V — the circuit would need a dual-rail supply (e.g. ±5V) to produce this output."}
  ],
  quickPrompts:["How do I choose R1 for a potential divider sensor circuit?","Explain RC time constant — what happens at each multiple of τ?","Walk me through a complete potential divider calculation with an LDR"]
