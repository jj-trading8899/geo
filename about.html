<script>
const TABS = ['overview','keyterms','casestudies','diagrams','analysis','quiz','tutor'];

const weeks = [
  {
    id: 0, week: "Topic 1", type: "physical",
    title: "Tectonic Processes & Hazards",
    focus: "Plate boundaries, hazard types, vulnerability and disaster risk management",
    topics: [
      { title: "Plate Boundary Types", body: "Convergent (destructive): plates collide → subduction → volcanoes and earthquakes. Divergent (constructive): plates separate → rift valleys, basaltic lava. Conservative: plates slide past each other → earthquakes only, no volcanism. Collision: continental-continental → fold mountains." },
      { title: "Earthquake Hazards", body: "Primary: ground shaking, surface rupture, liquefaction (saturated sediment behaves like liquid). Secondary: landslides, tsunamis, fires. Magnitude (Richter/moment scale) vs intensity (Mercalli scale — felt effects). Depth matters: shallow focus = greater surface damage." },
      { title: "Volcanic Hazards", body: "Primary: lava flows, pyroclastic flows (fast-moving hot gas + rock), tephra (ash). Secondary: lahars (volcanic mudflows), flooding from ice melt. Eruption style depends on silica content: low silica (basaltic) → effusive; high silica → explosive (e.g. composite volcanoes)." },
      { title: "Disaster Risk Framework", body: "Risk = Hazard × Vulnerability ÷ Capacity to Cope. LICs more vulnerable: poor infrastructure, high population density, limited emergency services, corruption. HAZARDs are physical events; DISASTERS occur when hazards intersect vulnerable populations. Park Model shows stages of recovery." }
    ],
    keyTerms: [
      { term: "Liquefaction", def: "When waterlogged sediment temporarily loses strength during an earthquake and behaves like a liquid, causing buildings to sink or topple.", tip: "Common in river deltas and reclaimed land — mention Christchurch 2011 or Kobe 1995." },
      { term: "Pyroclastic flow", def: "A fast-moving avalanche of hot gas, ash and rock fragments travelling at up to 700km/h — the most deadly volcanic hazard.", tip: "Distinguish from lava flows (slow, visible) — pyroclastic flows are near-impossible to outrun." },
      { term: "Lahar", def: "A volcanic mudflow formed when volcanic material (ash, debris) mixes with water from rainfall, snowmelt or crater lakes.", tip: "Armero disaster 1985 (Colombia) — Nevado del Ruiz lahar killed 23,000. Good secondary hazard example." },
      { term: "Magnitude vs Intensity", def: "Magnitude measures energy released at the source (Richter/Mw scale). Intensity measures shaking felt at a location (Mercalli scale) — varies with distance and geology.", tip: "A deep magnitude 7.0 may cause less damage than a shallow 6.0 — depth is crucial to mention." },
      { term: "Disaster Risk Equation", def: "Risk = (Hazard × Vulnerability) ÷ Capacity to Cope. Vulnerability includes poverty, poor governance, high density. Capacity includes technology, early warning systems, preparedness.", tip: "Use this framework in every tectonic hazard essay — it shows sophisticated analytical thinking." },
      { term: "Park Model", def: "A model showing community quality of life before, during and after a disaster — immediate relief → rehabilitation → reconstruction phases.", tip: "Compare LIC vs HIC recovery curves — LICs recover more slowly and may not return to pre-disaster quality of life." }
    ],
    casestudies: [
      {
        name: "Nepal Earthquake 2015",
        location: "Kathmandu, Nepal (LIC/LLDC context)",
        context: "Magnitude 7.8 earthquake on 25 April 2015, caused by convergent collision of Indian and Eurasian plates. Shallow focus (15km) near densely populated Kathmandu valley.",
        points: [
          { text: "<strong>8,964 deaths</strong> — largely due to poorly constructed buildings (unreinforced brick/stone) collapsing on densely packed urban population." },
          { text: "<strong>600,000+ buildings destroyed</strong> — including UNESCO heritage sites in Kathmandu Durbar Square; reconstruction costs estimated at $7 billion." },
          { text: "<strong>Landslides</strong> triggered across mountain valleys — secondary hazard that blocked roads and cut off remote villages for weeks." },
          { text: "<strong>Aid response complications</strong>: mountainous terrain, single airport in Kathmandu caused bottleneck. International aid of $4.1bn pledged but distribution slow." },
          { text: "<strong>Inequality of impact</strong>: remote hill districts (Gorkha, Sindhupalchok) worst affected but least accessible — illustrates rural-urban vulnerability gap." }
        ],
        significance: "✦ Key argument: Physical magnitude alone does not determine disaster severity — poverty, building quality and governance are the critical multipliers of vulnerability."
      },
      {
        name: "Montserrat Volcanic Crisis 1995–97",
        location: "Montserrat, Caribbean (UK Overseas Territory)",
        context: "Soufrière Hills composite volcano erupted after 400 years of dormancy. Ongoing crisis — southern half of island rendered uninhabitable by pyroclastic flows and lahars.",

    mcqBank: [
      { topic:"Tectonic Hazards", q:"At a destructive (convergent) plate boundary, which combination of hazards is produced?", opts:["Rift valleys and shield volcanoes","Fold mountains only — no volcanic activity","Earthquakes, explosive composite volcanoes and ocean trenches","Mid-ocean ridges and basaltic lava flows"], correct:2, exp:"Oceanic plate subducts under continental plate → ocean trench forms at surface → subducting plate melts → magma rises → composite (explosive) volcano forms inland. Friction on the subduction zone generates powerful earthquakes. Transform boundaries produce earthquakes only; constructive boundaries produce basaltic volcanism." },
      { topic:"Tectonic Hazards", q:"The 2015 Nepal earthquake killed nearly 9,000 people primarily because:", opts:["It was the most powerful earthquake ever recorded in the Himalayas","It struck at great depth (>100km) causing widespread surface rupture","Building quality was poor (unreinforced masonry) and the Kathmandu valley amplified seismic shaking on saturated sediments","Nepal had no seismic monitoring and no emergency services"], correct:2, exp:"Nepal's death toll reflects vulnerability, not just magnitude. Unreinforced brick and stone buildings collapsed catastrophically. Kathmandu is built on an ancient lake bed — soft sediments amplify shaking (site amplification). The disaster risk equation: high hazard × high vulnerability ÷ limited capacity to cope = disaster." },
      { topic:"Tectonic Hazards", q:"The Park Model shows that after a disaster, LIC communities typically:", opts:["Recover faster than HIC communities due to strong community cohesion","Recover more slowly and may not return to pre-disaster quality of life due to limited financial and institutional capacity","Follow the same recovery trajectory as HIC communities","Experience immediate government rebuilding within 6 months"], correct:1, exp:"The Park Model plots quality of life against time post-disaster. LICs: drop further at impact, recover more slowly through relief → rehabilitation → reconstruction. Financial constraints, weak governance, aid dependency and physical access barriers all slow LIC recovery. Haiti 2010 earthquake shows incomplete recovery over 10+ years." },
      { topic:"Tectonic Hazards", q:"A lahar is best defined as:", opts:["Fast-moving hot gas and rock fragments from a volcanic explosion","A volcanic mudflow formed when volcanic material mixes with water","Lava flowing slowly from an effusive eruption","A cloud of fine ash that can travel hundreds of kilometres"], correct:1, exp:"Lahar: volcanic mud flow — ash and debris mixed with water (from rainfall, snowmelt or crater lake breach). The Nevado del Ruiz lahar (Colombia, 1985) buried Armero killing 23,000 people. A secondary volcanic hazard that can travel great distances down river valleys long after an eruption." },
      { topic:"Coastal Systems", q:"Longshore drift transports sediment along the coast in the direction of:", opts:["The backwash — perpendicular to the shoreline","The prevailing wind direction, as swash arrives at an angle","The offshore current — toward the open sea","The steepest gradient of the seabed"], correct:1, exp:"Swash arrives at angle (set by prevailing wind direction); backwash returns perpendicular. Net sediment movement = direction of prevailing wind. In the UK, dominant LSD direction is south-west to north-east along many coasts. Essential process understanding for spits, bars and coastal management." },
      { topic:"Coastal Systems", q:"The Holderness coast erodes rapidly because:", opts:["It faces the high-energy Atlantic Ocean and is made of hard limestone","Glacial till (boulder clay) is weak, the North Sea provides fetch for storm waves, and the sediment budget is negative","Managed retreat has been deliberately imposed by the Environment Agency","It is experiencing isostatic uplift that exposes more cliff to wave erosion"], correct:1, exp:"Boulder clay (unconsolidated glacial till) has virtually no resistance to wave erosion. North Sea storms provide sufficient energy. Groynes downdrift (at Mappleton) have reduced natural sediment supply — negative sediment budget. Result: 1–2m/year erosion, up to 10m in storms." },
      { topic:"Coastal Systems", q:"Managed retreat as a coastal management strategy involves:", opts:["Building higher and stronger sea walls further inland","Deliberately allowing the sea to flood low-lying land in a controlled way, creating intertidal habitat","Removing all human development from the coastal zone","Replenishing beaches with imported sand to maintain their protective function"], correct:1, exp:"Managed retreat (managed realignment): sea defences are breached or removed, allowing controlled flooding of low-lying land. Creates saltmarsh and intertidal habitat — these absorb wave energy (natural coastal defence) and provide ecological benefits. Medmerry, West Sussex is the largest UK example." },
      { topic:"Coastal Systems", q:"A wave-cut platform is formed by:", opts:["Deposition of sediment in the sheltered water behind a headland","The progressive retreat of a cliff as wave erosion undercuts a notch at its base, leaving a gently sloping rock surface","Longshore drift depositing material across a bay mouth","Sea level rise flooding a former coastal plain"], correct:1, exp:"Wave erosion (hydraulic action, abrasion) concentrates at the base of a cliff → wave-cut notch forms → overhang collapses → cliff retreats → gently sloping rocky platform left behind, exposed at low tide. Wider platform = longer history of erosion." },
      { topic:"Water Cycle", q:"Evapotranspiration combines:", opts:["Evaporation from the sea and transpiration from ocean plants","Evaporation from land surfaces and transpiration from plant leaves — the largest output from most drainage basins in humid climates","Evaporation from rivers and transpiration from urban surfaces","Only transpiration — evaporation from soil is negligible"], correct:1, exp:"ET = evaporation (from soil, lakes, streams) + transpiration (water vapour released through plant stomata). In humid temperate climates, ET is the largest water output from a catchment. Forests have higher ET than grassland — deforestation increases run-off and stream discharge." },
      { topic:"Water Cycle", q:"A flashy hydrograph (short lag time, high peak) is associated with:", opts:["Dense forest cover with high infiltration capacity","Urbanisation: impermeable surfaces, drains and culverts speed run-off to channels","Deep permeable sandstone geology and low gradient","Long duration, low-intensity rainfall over a large catchment"], correct:1, exp:"Urban surfaces (tarmac, concrete, roofs) prevent infiltration → rapid surface run-off → water reaches channels quickly via drains and culverts → short lag time, high sharp peak. Flash floods in cities are a direct consequence of urbanisation reducing lag time." },
      { topic:"Water Cycle", q:"The UN defines water stress as annual freshwater availability below:", opts:["500m³ per person","1,000m³ per person","1,700m³ per person","3,000m³ per person"], correct:2, exp:"1,700m³/person/year = water stress threshold. Below 1,000m³ = scarcity. Below 500m³ = absolute scarcity. These thresholds are standard UN/WRI definitions — always cite with units in exam answers." },
      { topic:"Water Cycle", q:"Economic water scarcity (e.g. much of sub-Saharan Africa) is primarily caused by:", opts:["Insufficient annual rainfall to meet population needs","Lack of infrastructure to capture and distribute water that physically exists in adequate quantities","Over-abstraction of groundwater by industry","Climate change reducing precipitation by more than 50%"], correct:1, exp:"Economic scarcity: water physically exists (adequate rainfall) but infrastructure to capture, treat and distribute it is lacking — due to poverty, conflict, governance failures. Distinct from physical scarcity (genuinely arid regions). Solutions are different: investment in infrastructure vs supply-side engineering." },
      { topic:"Carbon Cycle", q:"The largest carbon store in the Earth system is:", opts:["The atmosphere","The biosphere (living organisms and soil)","The lithosphere (fossil fuels and carbonate rocks)","The oceans"], correct:2, exp:"The lithosphere contains far the most carbon: fossil fuels + carbonate rocks (limestone) hold an estimated 100 million GtC. Oceans hold ~38,000 GtC; soils ~2,500 GtC; atmosphere ~860 GtC. The lithosphere flux is geologically slow — human extraction massively accelerates it." },
      { topic:"Carbon Cycle", q:"Deforestation affects the carbon cycle by:", opts:["Increasing albedo only — no direct carbon effect","Releasing stored biosphere carbon AND reducing future photosynthesis capacity — a double impact on atmospheric CO₂","Increasing photosynthesis in remaining trees which compensates for trees removed","Only affecting local rainfall patterns, not global CO₂ levels"], correct:1, exp:"Deforestation: (1) destroys carbon store — stored carbon released via burning/decomposition, (2) reduces ongoing photosynthesis — smaller carbon sink. The Amazon (10% of terrestrial carbon) releasing carbon is critical — eastern Amazon is now a net carbon source due to deforestation and drought." },
      { topic:"Carbon Cycle", q:"The energy trilemma in energy policy refers to the three competing objectives of:", opts:["Solar, wind and nuclear energy provision","Sustainability (low carbon), security (reliable supply) and affordability (low cost)","Production, distribution and consumption of energy","National, regional and local energy governance"], correct:1, exp:"The World Energy Council's energy trilemma: sustainability (reducing emissions), security (reliable, resilient supply) and affordability (accessible, low-cost energy). Maximising all three simultaneously is very difficult — trade-offs are inevitable (e.g. nuclear: secure and affordable but controversial on sustainability; offshore wind: sustainable and secure but currently expensive)." },
      { topic:"Carbon Cycle", q:"A positive feedback loop in climate change refers to:", opts:["A beneficial policy that reduces carbon emissions","A self-reinforcing cycle that amplifies the original warming — e.g. ice melts → lower albedo → more warming → more ice melts","Ocean absorption of CO₂ reducing the rate of climate change","Government subsidies for renewable energy installations"], correct:1, exp:"Positive feedback = amplifying, not beneficial. The ice-albedo feedback is the most commonly tested: warming → sea ice melts → dark ocean replaces white ice → lower albedo → more solar energy absorbed → more warming. Also: permafrost thaw → methane release → more warming → more thaw." },
      { topic:"Globalisation", q:"Containerisation drove globalisation primarily by:", opts:["Enabling faster internet connections between countries","Standardising shipping containers and mechanising loading — dramatically reducing the cost and time of moving goods internationally","Allowing cultural products to be distributed digitally","Reducing the distance between capital cities"], correct:1, exp:"TEU (twenty-foot equivalent unit) standardisation from the 1960s enabled seamless transfer between ship, rail and truck — mechanised cranes replaced dock labour. Shipping costs fell ~90% in real terms. Made it economical to manufacture in Asia and sell in Europe — the foundation of global supply chains." },
      { topic:"Globalisation", q:"Glocalisation best describes:", opts:["The process by which all local cultures are replaced by a uniform global culture","The adaptation of global products and brands to local cultural and market conditions","The migration of skilled workers from LICs to HICs","The localisation of global supply chains to reduce carbon emissions"], correct:1, exp:"Glocalisation (global + local): TNCs modify products for local markets — McDonald's McAloo Tikki (India), McTeriyaki (Japan). Netflix produces local-language original content. Shows globalisation is not simply one-way cultural homogenisation — local adaptation is a commercial and social necessity." },
      { topic:"Globalisation", q:"The 'resource curse' paradox refers to:", opts:["The fact that renewable energy resources are distributed unequally around the world","Natural resource wealth paradoxically leading to slower development through elite capture, conflict and Dutch Disease effects","The difficulty of extracting resources from tropical environments","The depletion of global natural resources due to over-consumption"], correct:1, exp:"Resource curse: oil/mineral wealth → revenue concentrated in ruling elites → corruption and rent-seeking → civil conflict over resource control → 'Dutch Disease' (resource exports raise exchange rate, making manufacturing uncompetitive) → economic diversification fails. DRC (cobalt, coltan, diamonds) = HDI 0.459 despite enormous mineral wealth." },
      { topic:"Globalisation", q:"Apple's global production network is characterised by:", opts:["All stages of production located in California to protect intellectual property","Design in the USA capturing most value; low-margin assembly in China and India; components sourced from 43+ countries", "Manufacturing in the USA with retail exclusively in Asian markets","Equal distribution of profits between all countries in the supply chain"], correct:1, exp:"Apple captures ~60% of iPhone value through design, branding and IP (California). Foxconn/Pegatron assembly in China captures ~2%. Components: TSMC chips (Taiwan), cobalt (DRC), glass (USA/Japan). This 'smile curve' — high value at design and marketing ends, low at assembly — characterises all major TNC production networks." },
      { topic:"Regenerating Places", q:"The Index of Multiple Deprivation (IMD) measures deprivation across:", opts:["3 domains: income, health and education","5 domains: income, employment, health, education, housing","7 domains including crime and living environment","10 domains including digital access and social capital"], correct:2, exp:"IMD has exactly 7 domains: income, employment, health & disability, education/skills/training, crime, barriers to housing & services, living environment. It ranks every LSOA in England — decile 1 = most deprived 10%. Essential quantitative tool for measuring need for regeneration." },
      { topic:"Regenerating Places", q:"Gentrification is best described as:", opts:["Government-funded renewal of deprived areas through infrastructure investment","The process by which more affluent residents move into a low-income area, raising property values and often displacing original residents","The conversion of industrial brownfield land to new housing","The demolition of slum housing and replacement with social housing"], correct:1, exp:"Gentrification: middle-class in-migration → property prices rise → private landlords increase rents → original low-income residents cannot afford to stay → displacement. Physical environment improves; community character and affordability are lost. Brixton, Hackney, Shoreditch in London are classic UK examples." },
      { topic:"Regenerating Places", q:"Culture-led regeneration (as exemplified by Liverpool 2008) works mainly through:", opts:["Providing direct employment for local people in manufacturing","Changing place perception to attract tourists, investors and businesses, generating economic activity and improving city image","Building affordable housing for deprived communities","Reducing crime rates through community arts programmes"], correct:1, exp:"European Capital of Culture 2008: 9.7m visitors, £800m economic impact. Culture rebrands the place — from deprived/post-industrial to vibrant/creative — attracting tourists, media coverage and investor interest. Economic impact is real but may not filter through to most deprived communities." },
      { topic:"Regenerating Places", q:"A key criticism of the LDDC (London Docklands) regeneration is:", opts:["It failed to attract any significant businesses to the area","The LDDC was unaccountable to local residents and regeneration benefited incoming high-skill workers rather than existing working-class communities","It focused too heavily on affordable housing at the expense of commercial development","Environmental damage was caused by building on the river Thames"], correct:1, exp:"LDDC was a quango — not democratically elected, not accountable to Tower Hamlets or Southwark residents. Property-led model attracted global financial firms (Canary Wharf) requiring skills local communities did not have. Employment mismatch → local community did not primarily benefit from £7.7bn public investment." },
      { topic:"Global Development", q:"The Human Development Index (HDI) measures development using three dimensions. Which three?", opts:["Income, trade balance and educational spending","Life expectancy, education (schooling years) and standard of living (GNI per capita, PPP)","GDP growth rate, infant mortality and literacy rate","Employment rate, gender equality and environmental quality"], correct:1, exp:"HDI = health dimension (life expectancy at birth) + education dimension (mean years of schooling + expected years of schooling) + income dimension (GNI per capita, PPP-adjusted). Ranges 0–1. Key advantage over GDP alone: captures non-income dimensions of wellbeing." },
      { topic:"Global Development", q:"Remittances are particularly significant for LIC development because:", opts:["They are controlled by governments for infrastructure investment","They exceed ODA globally (~$647bn vs ~$200bn), go directly to household welfare, and are resilient during economic crises","They are interest-free and require no repayment","They fund government health and education systems directly"], correct:1, exp:"Remittances 2022: ~$647bn globally — more than 3× all ODA. They go directly to families (food, school fees, healthcare — not subject to government corruption). In Tajikistan: 34% of GDP. Resilient during crises (families need income most when economies collapse). Strongest argument for migration benefiting LIC origin countries." },
      { topic:"Global Development", q:"The epidemiological transition describes:", opts:["The spread of infectious diseases across borders due to globalisation","The shift from infectious/communicable diseases (LIC stage) to non-communicable degenerative diseases (HIC stage) as countries develop","The seasonal variation in disease patterns in tropical regions","The development of new vaccines to combat previously untreatable diseases"], correct:1, exp:"As countries develop: improved sanitation, nutrition, healthcare reduce infectious disease mortality → populations live longer → degenerative diseases (heart disease, cancer, diabetes) become dominant causes of death. Sub-Saharan Africa: still stage 2 (infectious disease burden high). HICs: stage 4 (NCDs dominant). China/India: mid-transition." },
      { topic:"Global Development", q:"Brain drain harms LIC development primarily because:", opts:["Migrants take physical capital (equipment, savings) out of the country","LICs lose their investment in educating skilled workers (doctors, engineers) who emigrate to HICs for higher wages","Migration increases competition for scarce jobs in LICs","Returning migrants destabilise LIC governments with foreign ideas"], correct:1, exp:"Ghana trains doctors at public expense — those doctors emigrate to UK's NHS. The UK receives skilled human capital without paying the training costs. For a country with severe doctor shortages, losing 50% of medical graduates to emigration is a genuine development crisis. Remittances partially compensate but do not replace the human capital loss." },
      { topic:"Paper 3 & Fieldwork", q:"A null hypothesis (H₀) in geographic fieldwork states:", opts:["The researcher's expected result based on theory","That there is NO significant relationship between the variables — any pattern is due to chance","The minimum sample size required for statistical validity","The method that will be used to collect primary data"], correct:1, exp:"H₀ always assumes no relationship/no difference. Statistical testing either rejects H₀ (pattern is significant — unlikely due to chance) or fails to reject H₀ (pattern could be random). You never 'prove' or 'accept' H₀. Example: 'There is no significant relationship between distance from city centre and pedestrian counts.'" },
      { topic:"Paper 3 & Fieldwork", q:"Spearman's rank correlation coefficient (Rs) of +0.91, exceeding the critical value, means:", opts:["There is no significant relationship between the variables","There is a weak positive correlation, unlikely to be significant","There is a strong positive correlation that is statistically significant — reject the null hypothesis","The data must be recollected as Rs values above 0.9 are not valid"], correct:2, exp:"Rs = +0.91: very strong (close to +1) positive correlation. Exceeding the critical value at 95% significance → reject H₀ → the relationship is statistically significant (less than 5% probability due to chance). Both variables increase together — state direction (+ve), strength (strong) and significance." },
      { topic:"Paper 3 & Fieldwork", q:"The Players, Attitudes and Actions (PAA) framework in Paper 3 requires candidates to:", opts:["Describe the physical processes that created the landscape in the resource booklet","Identify stakeholders, explain their values and interests, and analyse what actions they take and why","Calculate statistical measures of change in the data provided","Evaluate only the government's response to the geographic issue"], correct:1, exp:"PAA: Players (all stakeholders at multiple scales), Attitudes (their values, priorities and worldviews — ecocentric vs technocentric vs anthropocentric), Actions (what they do as a result — policies, protests, investments, legal challenges). Outcomes reflect the balance of power between players with competing attitudes." },
      { topic:"Paper 3 & Fieldwork", q:"Stratified sampling is chosen over random sampling when:", opts:["The population is too small for meaningful random sampling","The researcher needs each subgroup of the population to be represented proportionally","Only qualitative data is being collected","The geographic area is too remote for systematic transect sampling"], correct:1, exp:"Stratified sampling divides population into strata (e.g. by age, gender, land use type) and samples each in proportion. Ensures no subgroup is accidentally excluded or over-represented. More representative than random sampling when population has distinct, identifiable subgroups that may have different characteristics." },
      { topic:"Health & Intervention", q:"Which measure captures BOTH fatal and non-fatal disease burden in a population?", opts:["Infant mortality rate (IMR)","Life expectancy at birth","Disability Adjusted Life Years (DALYs)","Maternal mortality ratio (MMR)"], correct:2, exp:"DALYs = YLL (years of life lost to premature death) + YLD (years lived with disability). DALYs capture the full burden of disease including non-fatal conditions like depression, chronic pain and managed HIV — not just deaths. This makes DALYs superior for comparing health burdens across populations and between diseases of different severity." },
      { topic:"Health & Intervention", q:"Sub-Saharan Africa faces a 'double burden of disease'. This means:", opts:["The region has twice the global average number of doctors per capita","The region simultaneously faces high rates of both communicable diseases (HIV, malaria, TB) and rising non-communicable diseases (diabetes, cardiovascular) in urban areas","Two separate UN agencies are responsible for health funding in the region","The region's population has doubled in the past 20 years, straining health services"], correct:1, exp:"Double burden: SSA has not yet completed the epidemiological transition — communicable diseases (malaria, HIV/AIDS, diarrhoeal diseases) still dominate rural areas, while urbanisation drives rising NCDs (type 2 diabetes, hypertension, obesity-related conditions) in cities. Health systems must address both simultaneously with limited resources — a more complex challenge than either alone." },
      { topic:"Health & Intervention", q:"MSF (Médecins Sans Frontières) operates on the principle of medical neutrality. This means:", opts:["MSF only works in countries that are neutral in international conflicts","MSF treats patients regardless of their political affiliation, ethnicity or role in a conflict","MSF does not accept funding from any government","MSF staff are not permitted to comment publicly on political situations"], correct:1, exp:"Medical neutrality: MSF treats all wounded and sick people based on medical need alone — combatants, civilians, all sides of a conflict. This principle allows MSF to access populations in conflict zones that would otherwise be unreachable. However, maintaining neutrality becomes ethically contested when treating perpetrators of atrocities alongside their victims." },
      { topic:"Health & Intervention", q:"PEPFAR (US HIV/AIDS programme) has been criticised primarily because:", opts:["It has not saved a significant number of lives in sub-Saharan Africa","Its disease-specific (vertical) focus may have distorted health labour markets and neglected non-HIV health conditions","It imposed strict conditions requiring recipient countries to privatise their health services","It only provided funding to countries with democratic governments"], correct:1, exp:"PEPFAR has saved an estimated 25 million lives (major success). The primary criticism is its vertical nature: by funding HIV-specific clinics at better pay than government health services, it has drawn trained nurses and doctors away from primary care. It has also received less credit for horizontal health system strengthening. The Ebola outbreak in West Africa (2014) — in countries with PEPFAR programmes — exposed how vertical HIV programming left health systems fragile to novel outbreaks." }
    ]
  }
];

const TABS_GEO = ['overview','keyterms','casestudies','diagrams','analysis','quiz','tutor'];
let currentWeek = 0;
let activeTab = 'overview';
let scores = {};
let chatHistory = [];
let mcqFilter = 'All';
let mcqAnswers = {};
let mcqDone = false;

function buildNav() {
  const nav = document.getElementById('navItems');
  nav.innerHTML = weeks.map(w => `
    <div class="nav-item ${w.id === currentWeek ? 'active' : ''}" onclick="selectWeek(${w.id})">
      <div class="nav-dot dot-${w.type}"></div>
      <div class="nav-content">
        <div class="nav-week">${w.week}</div>
        <div class="nav-title">${w.title}</div>
      </div>
    </div>
  `).join('');
}

function selectWeek(id) {
  currentWeek = id;
  activeTab = weeks[id].isMCQ ? 'mcq' : 'overview';
  buildNav();
  renderContent();
  document.querySelector('.content').scrollTop = 0;
}

function renderContent() {
  const w = weeks[currentWeek];
  const score = scores[currentWeek] || { correct: 0, total: 0, done: false };
  const content = document.getElementById('mainContent');
  content.style.animation = 'none';
  setTimeout(() => { content.style.animation = 'fadeUp 0.25s ease'; }, 10);

  const typeLabel = w.type === 'physical' ? 'Physical Geography' : w.type === 'human' ? 'Human Geography' : w.type === 'revision' ? 'Revision · Mixed' : 'Synoptic · P3';
  const tagClass = `tag-${w.type}`;

  if (w.isMCQ) {
    content.innerHTML = `
      <div class="week-header">
        <div class="week-meta">
          <span class="week-tag tag-revision">Revision · Mixed</span>
          <span class="week-number muted">${w.week}</span>
        </div>
        <div class="week-title-text">${w.title}</div>
        <div class="week-focus">${w.focus}</div>
      </div>
      <div id="tabContent">${renderMCQRevision(w)}</div>
    `;
    return;
  }

  content.innerHTML = `
    <div class="week-header">
      <div class="week-meta">
        <span class="week-tag ${tagClass}">${typeLabel}</span>
        <span class="week-number muted">${w.week} of ${weeks.length - 1}</span>
      </div>
      <div class="week-title-text">${w.title}</div>
      <div class="week-focus">${w.focus}</div>
      <div class="progress-bar mt"><div class="progress-fill" style="width:${((w.id+1)/(weeks.length-1))*100}%"></div></div>
    </div>
    <div class="tabs">
      <div class="tab ${activeTab==='overview'?'active':''}" onclick="switchTab('overview')">Overview</div>
      <div class="tab ${activeTab==='keyterms'?'active':''}" onclick="switchTab('keyterms')">Key Terms</div>
      <div class="tab ${activeTab==='casestudies'?'active':''}" onclick="switchTab('casestudies')">Case Studies</div>
      <div class="tab ${activeTab==='diagrams'?'active':''}" onclick="switchTab('diagrams')">Diagrams</div>
      <div class="tab ${activeTab==='analysis'?'active':''}" onclick="switchTab('analysis')">Analysis</div>
      <div class="tab ${activeTab==='quiz'?'active':''}" onclick="switchTab('quiz')">Quiz${score.done ? ' ✓' : ''}</div>
      <div class="tab ${activeTab==='tutor'?'active':''}" onclick="switchTab('tutor')">AI Tutor</div>
    </div>
    <div id="tabContent">${renderTab(w, score)}</div>
  `;
  attachHandlers();
}

function renderTab(w, score) {
  switch(activeTab) {
    case 'overview':    return renderOverview(w);
    case 'keyterms':    return renderKeyTerms(w);
    case 'casestudies': return renderCaseStudies(w);
    case 'diagrams':    return renderDiagrams(w);
    case 'analysis':    return renderAnalysis(w);
    case 'quiz':        return renderQuiz(w, score);
    case 'tutor':       return renderTutor(w);
    default: return '';
  }
}

function switchTab(tab) {
  activeTab = tab;
  const w = weeks[currentWeek];
  const score = scores[currentWeek] || { correct: 0, total: 0, done: false };
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const idx = TABS.indexOf(tab);
  if (idx >= 0) document.querySelectorAll('.tab')[idx].classList.add('active');
  document.getElementById('tabContent').innerHTML = renderTab(w, score);
  attachHandlers();
}

function renderOverview(w) {
  return `
    <div class="topics-grid">
      ${w.topics.map(t => `
        <div class="topic-card">
          <div class="topic-card-title">${t.title}</div>
          <div class="topic-card-body">${t.body}</div>
        </div>
      `).join('')}
    </div>
    <div class="tutor-section">
      <div class="tutor-heading">Quick Tutor Prompts</div>
      <div class="quick-prompts">
        ${w.quickPrompts.map(p => `<button class="quick-btn" onclick="askTutor('${p.replace(/'/g,"\\'")}')">↗ ${p}</button>`).join('')}
      </div>
      <p style="font-size:13px;color:var(--muted)">Click any prompt or switch to the <strong style="color:var(--gold2)">AI Tutor</strong> tab for a full conversation.</p>
    </div>
  `;
}

function renderKeyTerms(w) {
  return `
    <div class="keyterm-section">
      <div class="section-heading">Key Terms — ${w.title}</div>
      <div class="keyterm-grid">
        ${w.keyTerms.map(k => `
          <div class="keyterm-card">
            <div class="keyterm-name">${k.term}</div>
            <div class="keyterm-def">${k.def}</div>
            <div class="keyterm-tip">📌 ${k.tip}</div>
          </div>
        `).join('')}
      </div>
    </div>
    <div style="font-size:13px;color:var(--muted);margin-top:1rem;font-style:italic;">
      Tip: For 4-mark definition questions, state the term → define precisely → give a located example → link to a process or impact.
    </div>
  `;
}

function renderCaseStudies(w) {
  return w.casestudies.map((cs, i) => `
    <div class="case-box">
      <div class="case-header" onclick="toggleCase(${i})">
        <div>
          <div class="case-label">Case Study ${i+1}</div>
          <div class="case-name">${cs.name}</div>
          <div class="case-location">📍 ${cs.location}</div>
        </div>
        <div class="toggle-icon" id="cicon-${i}">▼</div>
      </div>
      <div class="case-body" id="cs-${i}">
        <div class="case-context">${cs.context}</div>
        ${cs.points.map((p, pi) => `
          <div class="case-point">
            <div class="case-num">${pi+1}</div>
            <div class="case-text">${p.text}</div>
          </div>
        `).join('')}
        <div class="case-sig">${cs.significance}</div>
      </div>
    </div>
  `).join('') + `<p style="font-size:13px;color:var(--muted);margin-top:1rem;font-style:italic;">Click to expand each case study. For exams: always include a located example with data (numbers, dates, places) for every case study point.</p>`;
}

function renderDiagrams(w) {
  return w.diagrams.map(d => `
    <div class="diagram-guide">
      <div class="diagram-title">${d.title}</div>
      <ol class="diagram-steps">
        ${d.steps.map(s => `<li>${s}</li>`).join('')}
      </ol>
    </div>
  `).join('') + `
    <div class="diagram-guide" style="border-color:rgba(74,158,107,0.2);background:rgba(74,158,107,0.03);">
      <div class="diagram-title" style="color:var(--gold)">Edexcel Diagram Rules for Geography</div>
      <ol class="diagram-steps">
        <li>Always label axes, curves, zones and key points — unlabelled diagrams lose marks</li>
        <li>Use arrows to show direction of processes (wind direction, water movement, plate motion)</li>
        <li>Annotate diagrams — brief labels explain what and why, not just what</li>
        <li>Sketch maps should include a north arrow, scale bar or key where relevant</li>
        <li>In essays: draw the diagram clearly but refer to it explicitly in the text ("as shown in the diagram...")</li>
        <li>For graphs/data: always refer to specific data values, not just general trends</li>
      </ol>
    </div>
  `;
}

function renderAnalysis(w) {
  if (!w.analysis || w.analysis.length === 0) return '<p style="color:var(--muted);font-size:14px;font-style:italic;padding:1rem 0;">Analysis content coming soon.</p>';
  return `
    <div style="font-size:13px;color:var(--muted);margin-bottom:1.2rem;">
      Each card shows the <strong style="color:var(--gold2)">reasoning chain</strong> for essay arguments, followed by evaluation points and a common mistake to avoid.
    </div>
    ${w.analysis.map(a => `
      <div class="analysis-card">
        <div class="analysis-heading">${a.heading}</div>
        <div class="eval-label">Reasoning Chain</div>
        <div class="analysis-chain">${a.chain}</div>
        <div class="eval-label">Evaluation Points</div>
        <div class="eval-list">
          ${a.evals.map(e => `<div class="eval-item">${e}</div>`).join('')}
        </div>
        <div class="mistake-box">
          <div class="mistake-label">⚠ Common Mistake</div>
          <div class="mistake-text">${a.mistake}</div>
        </div>
      </div>
    `).join('')}
    <div style="font-size:13px;color:var(--muted);margin-top:1rem;font-style:italic;">
      Use the <strong style="color:var(--gold2)">AI Tutor</strong> tab to get a personalised essay paragraph on any of these arguments.
    </div>
  `;
}

function renderQuiz(w, score) {
  if (score.done) {
    return `
      <div class="quiz-score">Score: ${score.correct} / ${w.quiz.length} — ${Math.round(score.correct/w.quiz.length*100)}%</div>
      ${w.quiz.map((q, i) => `
        <div class="quiz-card">
          <div class="quiz-q">${i+1}. ${q.q}</div>
          <div class="quiz-options">
            ${q.opts.map((o, oi) => `<button class="quiz-opt ${oi === q.correct ? 'correct' : (score.answers && score.answers[i] === oi && oi !== q.correct ? 'wrong' : '')}" disabled>${o}</button>`).join('')}
          </div>
          <div class="quiz-explanation show">${q.exp}</div>
        </div>
      `).join('')}
      <button onclick="resetQuiz()" style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:8px 16px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:3px;margin-top:8px;">Retry Quiz</button>
    `;
  }
  return `
    <div class="quiz-score" id="quizScore">Question 1 of ${w.quiz.length}</div>
    ${w.quiz.map((q, i) => `
      <div class="quiz-card">
        <div class="quiz-q">${i+1}. ${q.q}</div>
        <div class="quiz-options">
          ${q.opts.map((o, oi) => `<button class="quiz-opt" onclick="answerQuiz(${i}, ${oi})" id="q${i}o${oi}">${o}</button>`).join('')}
        </div>
        <div class="quiz-explanation" id="exp${i}">${q.exp}</div>
      </div>
    `).join('')}
    <div id="submitRow" style="margin-top:12px;display:none;">
      <button onclick="submitQuiz()" style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:8px 16px;border:1px solid var(--teal2);background:rgba(61,168,194,0.1);color:var(--teal2);cursor:pointer;border-radius:3px;">Submit Answers</button>
    </div>
  `;
}

let quizAnswers = {};
function answerQuiz(qi, oi) {
  quizAnswers[qi] = oi;
  const w = weeks[currentWeek];
  w.quiz[qi].opts.forEach((_, i) => {
    const btn = document.getElementById(`q${qi}o${i}`);
    if (btn) btn.style.borderColor = i === oi ? 'var(--gold2)' : '';
  });
  const answered = Object.keys(quizAnswers).length;
  document.getElementById('quizScore').textContent = `${answered} of ${w.quiz.length} answered`;
  if (answered === w.quiz.length) document.getElementById('submitRow').style.display = 'block';
}

function submitQuiz() {
  const w = weeks[currentWeek];
  let correct = 0;
  w.quiz.forEach((q, i) => {
    const chosen = quizAnswers[i];
    q.opts.forEach((_, oi) => {
      const btn = document.getElementById(`q${i}o${oi}`);
      if (!btn) return;
      btn.disabled = true;
      if (oi === q.correct) btn.classList.add('correct');
      else if (chosen === oi) btn.classList.add('wrong');
    });
    if (chosen === q.correct) correct++;
    const exp = document.getElementById(`exp${i}`);
    if (exp) exp.classList.add('show');
  });
  scores[currentWeek] = { correct, total: w.quiz.length, done: true, answers: {...quizAnswers} };
  quizAnswers = {};
  document.getElementById('quizScore').textContent = `Score: ${correct} / ${w.quiz.length} — ${Math.round(correct/w.quiz.length*100)}%`;
  document.getElementById('submitRow').innerHTML = `<button onclick="resetQuiz()" style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:8px 16px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:3px;">Retry Quiz</button>`;
}

function resetQuiz() {
  scores[currentWeek] = { correct: 0, total: 0, done: false };
  quizAnswers = {};
  switchTab('quiz');
}

function renderMCQRevision(w) {
  const bank = w.mcqBank;
  const topics = ['All', ...new Set(bank.map(q => q.topic))];
  const filtered = mcqFilter === 'All' ? bank : bank.filter(q => q.topic === mcqFilter);

  if (mcqDone) {
    let total = 0, correct = 0;
    const byTopic = {};
    bank.forEach((q, i) => {
      byTopic[q.topic] = byTopic[q.topic] || { correct: 0, total: 0 };
      byTopic[q.topic].total++; total++;
      if (mcqAnswers[i] === q.correct) { correct++; byTopic[q.topic].correct++; }
    });
    const pct = Math.round(correct/total*100);
    const grade = pct >= 80 ? '🏆 Excellent' : pct >= 60 ? '✓ Good' : pct >= 40 ? '△ Needs work' : '✗ Keep revising';
    return `
      <div class="mcq-results">
        <div class="mcq-results-score">${correct} / ${total} — ${pct}%</div>
        <div class="mcq-results-sub">${grade} · ${total} questions across all 8 topics</div>
        <div class="mcq-breakdown">
          ${Object.entries(byTopic).map(([t, s]) => `
            <div class="mcq-breakdown-item">
              <div class="mcq-breakdown-topic">${t}</div>
              <div class="mcq-breakdown-score"><span>${s.correct}/${s.total}</span> — ${Math.round(s.correct/s.total*100)}%</div>
            </div>
          `).join('')}
        </div>
      </div>
      ${bank.map((q, i) => `
        <div class="quiz-card">
          <div class="q-topic-tag">${q.topic}</div>
          <div class="quiz-q">${i+1}. ${q.q}</div>
          <div class="quiz-options">
            ${q.opts.map((o, oi) => `<button class="quiz-opt ${oi === q.correct ? 'correct' : (mcqAnswers[i] === oi && oi !== q.correct ? 'wrong' : '')}" disabled>${o}</button>`).join('')}
          </div>
          <div class="quiz-explanation show">${q.exp}</div>
        </div>
      `).join('')}
      <button onclick="resetMCQ()" style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:8px 16px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:3px;margin-top:8px;">Start Over</button>
    `;
  }

  const answeredCount = Object.keys(mcqAnswers).length;
  return `
    <div class="mcq-filter-bar">
      ${topics.map(t => `<button class="mcq-filter-btn ${mcqFilter === t ? 'active' : ''}" onclick="setMCQFilter('${t}')">${t}</button>`).join('')}
    </div>
    <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:0.06em;margin-bottom:1rem;">
      Showing ${filtered.length} of ${bank.length} questions · ${answeredCount} answered
    </div>
    ${filtered.map((q) => {
      const gi = bank.indexOf(q);
      const chosen = mcqAnswers[gi];
      return `
        <div class="quiz-card">
          <div class="q-topic-tag">${q.topic}</div>
          <div class="quiz-q">${gi+1}. ${q.q}</div>
          <div class="quiz-options">
            ${q.opts.map((o, oi) => `<button class="quiz-opt${chosen !== undefined ? (oi === q.correct ? ' correct' : (chosen === oi ? ' wrong' : '')) : ''}" onclick="mcqAnswer(${gi},${oi})" ${chosen !== undefined ? 'disabled' : ''} id="mcq${gi}o${oi}">${o}</button>`).join('')}
          </div>
          <div class="quiz-explanation${chosen !== undefined ? ' show' : ''}" id="mcqexp${gi}">${q.exp}</div>
        </div>
      `;
    }).join('')}
    ${mcqFilter === 'All' ? `
      <div id="mcqSubmitRow" style="margin-top:12px;${answeredCount < bank.length ? 'display:none;' : ''}">
        <button onclick="submitMCQ()" style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:8px 16px;border:1px solid var(--teal2);background:rgba(61,168,194,0.1);color:var(--teal2);cursor:pointer;border-radius:3px;">See Full Results &amp; Breakdown</button>
      </div>
    ` : `<p style="font-size:13px;color:var(--muted);margin-top:1rem;font-style:italic;">Select "All" to submit and see your results breakdown.</p>`}
  `;
}

function setMCQFilter(topic) {
  mcqFilter = topic;
  document.getElementById('tabContent').innerHTML = renderMCQRevision(weeks[currentWeek]);
}

function mcqAnswer(qi, oi) {
  if (mcqAnswers[qi] !== undefined) return;
  mcqAnswers[qi] = oi;
  const q = weeks[currentWeek].mcqBank[qi];
  q.opts.forEach((_, i) => {
    const btn = document.getElementById(`mcq${qi}o${i}`);
    if (!btn) return;
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else if (i === oi) btn.classList.add('wrong');
  });
  const exp = document.getElementById(`mcqexp${qi}`);
  if (exp) exp.classList.add('show');
  const bank = weeks[currentWeek].mcqBank;
  const answeredCount = Object.keys(mcqAnswers).length;
  const submitRow = document.getElementById('mcqSubmitRow');
  if (submitRow && answeredCount >= bank.length) submitRow.style.display = 'block';
}

function submitMCQ() { mcqDone = true; document.getElementById('tabContent').innerHTML = renderMCQRevision(weeks[currentWeek]); }
function resetMCQ() { mcqAnswers = {}; mcqDone = false; mcqFilter = 'All'; document.getElementById('tabContent').innerHTML = renderMCQRevision(weeks[currentWeek]); }

function renderTutor(w) {
  const msgs = (chatHistory[currentWeek] || []);
  return `
    <div class="tutor-section" style="padding-top:0;border-top:none;margin-top:0;">
      <div class="tutor-heading">AI Geography Tutor</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:12px;">Ask anything about ${w.title}. Essay arguments, case study details, diagram guidance, exam technique.</p>
      <div class="quick-prompts">
        ${w.quickPrompts.map(p => `<button class="quick-btn" onclick="sendFromBtn('${p.replace(/'/g,"\\'")}')">↗ ${p}</button>`).join('')}
      </div>
      <div class="chat-area">
        <div class="chat-messages" id="chatMsgs">
          ${msgs.length === 0 ? `<div style="color:var(--muted);font-size:13px;text-align:center;margin:auto;padding:2rem;font-style:italic;">Ask a question about ${w.title} to begin…</div>` : msgs.map(m => `<div class="msg msg-${m.role}"><div class="msg-label">${m.role === 'user' ? 'You' : 'Tutor'}</div>${m.content}</div>`).join('')}
        </div>
        <div class="chat-input-row">
          <textarea class="chat-input" id="chatInput" rows="1" placeholder="Ask about ${w.title}…" onkeydown="handleKey(event)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  `;
}

function attachHandlers() {
  const ta = document.getElementById('chatInput');
  if (ta) ta.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 100) + 'px'; });
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

function toggleCase(i) {
  const body = document.getElementById(`cs-${i}`);
  const icon = document.getElementById(`cicon-${i}`);
  if (body.classList.contains('open')) { body.classList.remove('open'); icon.textContent = '▼'; }
  else { body.classList.add('open'); icon.textContent = '▲'; }
}

function sendFromBtn(text) {
  if (activeTab !== 'tutor') { activeTab = 'tutor'; switchTab('tutor'); }
  setTimeout(() => { const inp = document.getElementById('chatInput'); if (inp) { inp.value = text; sendMessage(); } }, 100);
}

function askTutor(text) {
  activeTab = 'tutor'; switchTab('tutor');
  setTimeout(() => { const inp = document.getElementById('chatInput'); if (inp) { inp.value = text; sendMessage(); } }, 100);
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const msgs = document.getElementById('chatMsgs');
  if (!input || !input.value.trim()) return;
  const text = input.value.trim();
  input.value = ''; input.style.height = 'auto';
  if (sendBtn) sendBtn.disabled = true;
  if (!chatHistory[currentWeek]) chatHistory[currentWeek] = [];
  chatHistory[currentWeek].push({ role: 'user', content: text });
  msgs.innerHTML = chatHistory[currentWeek].map(m => `<div class="msg msg-${m.role}"><div class="msg-label">${m.role === 'user' ? 'You' : 'Tutor'}</div>${m.content}</div>`).join('');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'msg msg-ai';
  typingDiv.innerHTML = `<div class="msg-label">Tutor</div><div class="typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(typingDiv);
  msgs.scrollTop = msgs.scrollHeight;
  const w = weeks[currentWeek];
  const systemPrompt = `You are an expert Edexcel A Level Geography tutor. The student is currently studying: "${w.title}" (${w.week}). Focus: ${w.focus}.
Key concepts: ${w.topics.map(t=>t.title).join(', ')}.
Key terms: ${w.keyTerms.map(k=>k.term).join(', ')}.
Case studies available: ${w.casestudies.map(c=>c.name).join(', ')}.

Your role:
- Give clear, exam-focused explanations with located, data-rich examples
- Use Edexcel A Level Geography terminology and mark scheme language
- For essay questions: structure responses using PEEL (Point, Evidence, Explain, Evaluate) or PAA (Players, Attitudes, Actions) where relevant
- When discussing case studies: always include specific data (numbers, dates, places)
- Give exam technique tips (e.g. for 8-mark, 12-mark, 20-mark questions)
- Be concise but thorough. Use • bullet points for lists.
- Always distinguish between correlation and causation, and between physical and human factors`;

  const messages = chatHistory[currentWeek].map(m => ({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.content.replace(/<[^>]*>/g, '') }));
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: systemPrompt, messages })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Sorry, I could not get a response. Please try again.';
    const formatted = reply
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code style="font-family:\'DM Mono\',monospace;background:rgba(61,168,194,0.12);color:var(--teal2);padding:1px 5px;border-radius:2px;font-size:13px;">$1</code>')
      .replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
    chatHistory[currentWeek].push({ role: 'ai', content: formatted });
    typingDiv.remove();
    msgs.innerHTML = chatHistory[currentWeek].map(m => `<div class="msg msg-${m.role}"><div class="msg-label">${m.role === 'user' ? 'You' : 'Tutor'}</div>${m.content}</div>`).join('');
  } catch(e) {
    typingDiv.remove();
    const errDiv = document.createElement('div');
    errDiv.className = 'msg msg-ai';
    errDiv.innerHTML = `<div class="msg-label">Tutor</div>Network error — please check your connection and retry.`;
    msgs.appendChild(errDiv);
  }
  if (sendBtn) sendBtn.disabled = false;
  msgs.scrollTop = msgs.scrollHeight;
}

buildNav();
renderContent();
</script>
</body>
</html>
